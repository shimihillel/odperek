<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#070b19">
<title>עוד פרק אחד v30</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
:root{
  --bg:#fff4eb;
  --cream:#fffaf4;
  --cream2:#f8e4d6;
  --ink:#2a1715;
  --muted:#8b655a;
  --line:#ead1c4;
  --red:#c95852;
  --red2:#9f3f46;
  --wine:#762d3f;
  --rose:#e4aaa0;
  --sand:#ffe1a6;
  --shadow:0 18px 45px rgba(76,34,28,.14);
  --soft:0 9px 22px rgba(76,34,28,.08);
}
*{box-sizing:border-box;font-style:normal}
body{
  margin:0;
  min-height:100dvh;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 12% 6%,rgba(255,225,166,.62),transparent 24%),
    radial-gradient(circle at 88% 5%,rgba(159,63,70,.19),transparent 26%),
    radial-gradient(circle at 75% 92%,rgba(201,88,82,.18),transparent 28%),
    linear-gradient(145deg,#fffaf4 0%,#f2d7c8 100%);
}
button,input,textarea{font:inherit}
button{cursor:pointer}
.app{
  max-width:430px;
  margin:0 auto;
  min-height:100dvh;
  padding:18px 16px 92px;
  position:relative;
}
.screen{display:none}
.screen.active{display:block}
.top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:4px 0 18px;
}
.iconBtn{
  width:42px;height:42px;border-radius:16px;
  border:1px solid rgba(159,63,70,.12);
  background:rgba(255,250,244,.68);
  color:var(--red2);
  display:grid;place-items:center;
  font-weight:900;
  box-shadow:var(--soft);
}
.brandBlock{text-align:center;flex:1}
.brand{
  margin:0;
  font-size:40px;
  line-height:1;
  letter-spacing:-1px;
  font-weight:950;
}
.sub{
  color:var(--muted);
  font-weight:700;
  margin-top:8px;
  font-size:15px;
}
.card{
  background:rgba(255,250,244,.86);
  border:1px solid rgba(159,63,70,.12);
  border-radius:28px;
  padding:16px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
}
.nowCard{
  position:relative;
  overflow:hidden;
}
.nowCard:before{
  content:"";
  position:absolute;
  inset:-40px auto auto -45px;
  width:150px;height:150px;border-radius:50%;
  background:rgba(255,225,166,.55);
}
.nowBadge{
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:8px 12px;
  border-radius:999px;
  background:linear-gradient(135deg,var(--red),#db756c);
  color:white;
  font-weight:900;
  font-size:13px;
  box-shadow:0 7px 16px rgba(201,88,82,.22);
}
.nowContent{position:relative;z-index:1}
.nowGrid{
  display:grid;
  grid-template-columns:112px 1fr;
  gap:16px;
  align-items:center;
  margin-top:13px;
}
.cover{
  min-height:156px;
  border-radius:18px;
  background:
    radial-gradient(circle at 25% 20%,rgba(255,225,166,.7),transparent 28%),
    linear-gradient(150deg,#2b1415,#7d2e38 62%,#d07a67);
  color:#ffe2bf;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:12px;
  box-shadow:0 16px 26px rgba(43,20,21,.22);
  overflow:hidden;
  position:relative;
}
.cover:after{
  content:"♡";
  position:absolute;
  top:8px;left:10px;
  color:rgba(255,255,255,.55);
  font-size:24px;
}
.coverTitle{
  font-weight:950;
  font-size:18px;
  line-height:1.08;
}
.coverAuthor{font-size:12px;color:rgba(255,242,226,.78);margin-top:5px;font-weight:800}
.nowBookTitle{font-size:26px;font-weight:950;line-height:1.08;margin-bottom:5px}
.nowAuthor{color:var(--muted);font-weight:800}
.percentBig{
  font-size:50px;
  font-weight:950;
  color:var(--red);
  line-height:1;
  margin-top:12px;
}
.percentLbl{color:var(--muted);font-weight:800}
.progressBar{
  height:12px;
  background:#ecd3c7;
  border-radius:999px;
  overflow:hidden;
  margin-top:10px;
}
.progressFill{
  height:100%;
  width:0;
  background:linear-gradient(90deg,var(--wine),var(--red),#e49772);
  border-radius:999px;
}
.vibeRow{
  margin:12px 0 0;
  display:flex;
  align-items:center;
  gap:8px;
  background:rgba(255,255,255,.58);
  border:1px solid rgba(159,63,70,.10);
  border-radius:18px;
  padding:10px 12px;
  font-weight:900;
}
.vibeEmoji{font-size:28px}
.mainAction{
  width:100%;
  border:0;
  border-radius:22px;
  padding:17px 20px;
  margin-top:14px;
  color:white;
  background:linear-gradient(135deg,var(--red),var(--red2));
  font-weight:950;
  font-size:18px;
  box-shadow:0 15px 28px rgba(159,63,70,.24);
}
.secondaryAction{
  width:100%;
  border:1px solid rgba(159,63,70,.18);
  border-radius:20px;
  padding:14px 16px;
  margin-top:10px;
  color:var(--wine);
  background:rgba(255,250,244,.72);
  font-weight:900;
}
.sectionHead{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:22px 2px 10px;
}
.sectionTitle{font-size:18px;font-weight:950}
.textBtn{
  border:0;background:transparent;color:var(--red2);font-weight:900;padding:4px 0;
}
.momentList{display:grid;gap:8px}
.moment{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:9px;
  background:rgba(255,250,244,.74);
  border:1px solid rgba(159,63,70,.10);
  border-radius:18px;
  padding:10px 11px;
  box-shadow:var(--soft);
}
.momentType{
  width:36px;height:36px;border-radius:13px;
  display:grid;place-items:center;
  background:rgba(201,88,82,.12);
}
.momentMeta{color:var(--muted);font-size:12px;font-weight:900;margin-bottom:2px}
.momentText{font-weight:800;line-height:1.35}
.shelfRow{
  display:flex;gap:10px;overflow:auto;padding-bottom:7px;
}
.bookSmall{
  flex:0 0 100px;
  min-height:142px;
  border-radius:18px;
  background:linear-gradient(150deg,#321818,#80343f 60%,#d38167);
  color:#fff2e3;
  padding:10px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  box-shadow:0 12px 22px rgba(60,24,22,.18);
}
.bookSmallTitle{font-weight:950;line-height:1.08}
.bookSmallMeta{font-size:12px;color:rgba(255,242,226,.75);font-weight:800;margin-top:5px}
.empty{
  text-align:center;
  color:var(--muted);
  font-weight:800;
  padding:28px 16px;
}
.nav{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  bottom:14px;
  width:min(398px,calc(100% - 28px));
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  background:rgba(255,250,244,.86);
  border:1px solid rgba(159,63,70,.13);
  border-radius:25px;
  padding:8px;
  box-shadow:0 15px 40px rgba(76,34,28,.17);
  backdrop-filter:blur(10px);
  z-index:10;
}
.nav button{
  border:0;background:transparent;border-radius:18px;
  padding:9px 3px;color:#876156;font-weight:900;font-size:12px;
}
.nav button.on{background:rgba(201,88,82,.13);color:var(--red2)}
.pageHead{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.pageTitle{
  font-size:28px;font-weight:950;line-height:1.05;flex:1;
}
.fieldHero{
  background:linear-gradient(145deg,var(--red2),#b94f51);
  color:white;
  border-radius:0 0 30px 30px;
  margin:-18px -16px 16px;
  padding:18px 16px 20px;
  box-shadow:0 15px 35px rgba(117,45,63,.22);
}
.fieldHero .iconBtn{
  background:rgba(255,255,255,.14);
  color:white;
  border-color:rgba(255,255,255,.18);
  box-shadow:none;
}
.fieldTopRow{display:flex;align-items:center;gap:10px}
.fieldTitle{font-size:31px;font-weight:950;flex:1}
.fieldBook{
  margin-top:14px;
  background:rgba(255,250,244,.92);
  color:var(--ink);
  border-radius:22px;
  padding:12px;
  display:grid;
  grid-template-columns:1fr 70px;
  gap:12px;
  align-items:center;
}
.fieldBookName{font-weight:950;font-size:18px}
.fieldBookAuthor{color:var(--muted);font-weight:800;font-size:13px}
.fieldPercent{font-size:30px;font-weight:950;color:var(--red)}
.accordion{display:grid;gap:11px}
.accCard{
  background:rgba(255,250,244,.88);
  border:1px solid rgba(159,63,70,.12);
  border-radius:24px;
  box-shadow:var(--soft);
  overflow:hidden;
}
.accHead{
  width:100%;
  border:0;background:transparent;
  padding:15px 15px;
  display:flex;align-items:center;gap:10px;text-align:right;
}
.accIcon{
  width:38px;height:38px;border-radius:14px;
  display:grid;place-items:center;
  background:rgba(201,88,82,.12);
  color:var(--red2);
  font-size:20px;
}
.accTitle{font-weight:950;font-size:17px;flex:1}
.accChevron{color:var(--muted);font-weight:950}
.accBody{display:none;padding:0 15px 15px}
.accCard.open .accBody{display:block}
.input,.textarea{
  width:100%;
  border:1px solid rgba(159,63,70,.16);
  background:#fffdf9;
  border-radius:18px;
  padding:13px 14px;
  color:var(--ink);
  outline:none;
  font-weight:800;
}
.textarea{min-height:105px;resize:vertical;line-height:1.45}
.help{color:var(--muted);font-weight:800;font-size:13px;margin:7px 1px 10px}
.inline{
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  align-items:center;
}
.saveBtn,.pillBtn{
  border:0;border-radius:18px;
  background:linear-gradient(135deg,var(--red),var(--red2));
  color:white;
  font-weight:950;
  padding:12px 16px;
}
.pillBtn{
  border-radius:999px;
  padding:10px 14px;
  font-size:13px;
}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  border:1px solid rgba(159,63,70,.14);
  background:#fffdf9;
  color:var(--ink);
  border-radius:999px;
  padding:10px 13px;
  font-weight:900;
}
.chip.on{background:var(--red);color:white;border-color:var(--red)}
.charList{display:grid;gap:8px;margin-top:12px}
.charRow{
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  align-items:center;
  background:#fffdf9;
  border:1px solid rgba(159,63,70,.11);
  border-radius:17px;
  padding:10px 11px;
}
.charName{font-weight:950}
.charMeta{color:var(--muted);font-weight:800;font-size:12px}
.miniBtn{
  border:1px solid rgba(159,63,70,.16);
  background:rgba(255,250,244,.8);
  color:var(--red2);
  border-radius:13px;
  padding:8px 10px;
  font-weight:900;
}
.bottomMoments{
  margin-top:14px;
}
.summaryHero{
  background:linear-gradient(145deg,var(--red2),#b95255);
  color:white;
  border-radius:0 0 30px 30px;
  margin:-18px -16px 16px;
  padding:18px 16px 20px;
}
.summaryTitle{font-size:33px;font-weight:950;flex:1}
.stepCard{
  background:rgba(255,250,244,.9);
  border:1px solid rgba(159,63,70,.12);
  border-radius:25px;
  padding:15px;
  box-shadow:var(--soft);
  margin-bottom:11px;
}
.stepTitle{font-size:19px;font-weight:950;margin-bottom:10px}
.rateGroup{margin:10px 0 15px}
.rateLabel{font-weight:950;color:var(--wine);margin-bottom:8px}
.rateBtns{display:flex;gap:7px;flex-wrap:wrap}
.rateBtn{
  min-width:48px;
  border:1px solid rgba(159,63,70,.14);
  border-radius:15px;
  background:#fffdf9;
  padding:10px 11px;
  font-weight:950;
}
.rateBtn.on{background:var(--red);color:white;border-color:var(--red)}
.doneBtn{
  width:100%;
  border:0;
  margin-top:8px;
  border-radius:22px;
  padding:17px 20px;
  color:white;
  background:linear-gradient(135deg,var(--wine),var(--red2));
  font-size:20px;
  font-weight:950;
  box-shadow:0 15px 28px rgba(117,45,63,.24);
}
.tagSmall{
  display:inline-flex;
  border-radius:999px;
  padding:5px 9px;
  background:rgba(201,88,82,.12);
  color:var(--red2);
  font-size:12px;
  font-weight:900;
}
.toast{
  position:fixed;
  bottom:91px;
  left:50%;
  transform:translateX(-50%) translateY(10px);
  background:#2a1715;
  color:white;
  padding:11px 16px;
  border-radius:999px;
  font-weight:900;
  opacity:0;
  pointer-events:none;
  transition:.2s;
  z-index:30;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* v7 — סטטיסטיקה + הוספת דמות בתוך מסכמת */
.statsGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.statTile{
  background:rgba(255,250,244,.88);
  border:1px solid rgba(159,63,70,.12);
  border-radius:24px;
  padding:15px;
  box-shadow:var(--soft);
  min-height:112px;
}
.statNum{
  font-size:34px;
  font-weight:950;
  color:var(--red2);
  line-height:1;
}
.statLbl{
  color:var(--muted);
  font-weight:900;
  margin-top:7px;
}
.statHero{
  background:
    radial-gradient(circle at left top,rgba(255,225,166,.62),transparent 32%),
    linear-gradient(145deg,#fffaf4,#f3d1c4);
  border:1px solid rgba(159,63,70,.13);
  border-radius:30px;
  padding:18px;
  box-shadow:var(--shadow);
  margin-bottom:14px;
}
.statHeroTitle{
  font-size:30px;
  font-weight:950;
  line-height:1.05;
}
.statHeroSub{
  color:var(--muted);
  font-weight:850;
  margin-top:7px;
}
.summaryAddBox{
  margin-top:10px;
  padding:12px;
  border-radius:20px;
  background:#fffdf9;
  border:1px dashed rgba(159,63,70,.25);
}


/* v8 — פרטי ספר מלאים + מחיקה */
.detailHeroCard{
  background:linear-gradient(145deg,#fffaf4,#f1d1c2);
  border:1px solid rgba(159,63,70,.13);
  border-radius:30px;
  padding:16px;
  box-shadow:var(--shadow);
  margin-bottom:12px;
}
.detailGrid{
  display:grid;
  grid-template-columns:112px 1fr;
  gap:14px;
  align-items:center;
}
.detailActions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
  margin-top:12px;
}
.dangerBtn{
  border:1px solid rgba(159,63,70,.25);
  color:#8b2635;
  background:rgba(255,250,244,.82);
  border-radius:20px;
  padding:14px 16px;
  font-weight:950;
}
.fullSection{
  background:rgba(255,250,244,.9);
  border:1px solid rgba(159,63,70,.12);
  border-radius:24px;
  padding:15px;
  box-shadow:var(--soft);
  margin-bottom:11px;
}
.fullTitle{
  font-size:18px;
  font-weight:950;
  margin-bottom:10px;
  color:var(--wine);
}
.infoLine{
  display:grid;
  gap:5px;
  margin:10px 0;
}
.infoLbl{
  color:var(--muted);
  font-weight:900;
  font-size:13px;
}
.infoTxt{
  font-weight:850;
  line-height:1.45;
}
.deleteConfirm{
  position:fixed;
  inset:0;
  background:rgba(42,23,21,.38);
  display:none;
  place-items:end center;
  z-index:50;
  padding:16px;
}
.deleteConfirm.show{display:grid}
.confirmBox{
  width:min(430px,100%);
  background:#fffaf4;
  border:1px solid rgba(159,63,70,.16);
  border-radius:28px;
  padding:18px;
  box-shadow:0 25px 70px rgba(42,23,21,.30);
}
.confirmTitle{
  font-size:22px;
  font-weight:950;
}
.confirmText{
  color:var(--muted);
  font-weight:800;
  margin:7px 0 14px;
}


/* v9 — תיקוני אמת: סטטיסטיקה, דמויות, פרטי ספר ומחיקה */
.statsGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.statTile{
  background:rgba(255,250,244,.88);
  border:1px solid rgba(159,63,70,.12);
  border-radius:24px;
  padding:15px;
  box-shadow:var(--soft);
  min-height:112px;
}
.statNum{
  font-size:34px;
  font-weight:950;
  color:var(--red2);
  line-height:1;
}
.statLbl{
  color:var(--muted);
  font-weight:900;
  margin-top:7px;
}
.statHero{
  background:radial-gradient(circle at left top,rgba(255,225,166,.62),transparent 32%),linear-gradient(145deg,#fffaf4,#f3d1c4);
  border:1px solid rgba(159,63,70,.13);
  border-radius:30px;
  padding:18px;
  box-shadow:var(--shadow);
  margin-bottom:14px;
}
.statHeroTitle{
  font-size:30px;
  font-weight:950;
  line-height:1.05;
}
.statHeroSub{
  color:var(--muted);
  font-weight:850;
  margin-top:7px;
}


/* v11 — אייקונים סופיים + חיפוש יציב */
.ratingLine{
  display:inline-flex;
  align-items:center;
  flex-wrap:wrap;
  gap:7px;
}
.ratingStack{
  display:inline-flex;
  align-items:center;
  gap:3px;
}
.ratingSvg{
  width:18px;
  height:18px;
  display:inline-block;
  vertical-align:middle;
}
.ratingSvg svg{
  width:100%;
  height:100%;
  display:block;
}
.rateBtn .ratingStack{
  justify-content:center;
}
.rateBtn.on .ratingSvg svg *{
  fill:#fffaf4 !important;
  stroke:#fffaf4 !important;
}
.speedBox{
  display:grid;
  gap:10px;
}
.speedLabels{
  display:flex;
  justify-content:space-between;
  gap:5px;
  color:var(--muted);
  font-size:11px;
  font-weight:900;
}
.speedLabels span{
  max-width:58px;
  text-align:center;
}
.speedSlider{
  width:100%;
  accent-color:var(--red2);
}
.speedValue{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:9px 13px;
  border-radius:999px;
  background:rgba(201,88,82,.12);
  color:var(--red2);
  font-weight:950;
  width:max-content;
}
.shelfSearch{
  margin:3px 0 14px;
}
.searchEmpty{
  text-align:center;
  color:var(--muted);
  font-weight:850;
  padding:22px 12px;
}
.statNum .ratingSvg{
  width:16px;
  height:16px;
}


/* v12 — מיון וסינון במדף */
.shelfTools{
  display:grid;
  gap:9px;
  margin:3px 0 14px;
}
.toolRow{
  display:flex;
  gap:8px;
  align-items:center;
  overflow-x:auto;
  padding-bottom:2px;
}
.toolBtn{
  border:1px solid rgba(159,63,70,.16);
  background:rgba(255,250,244,.84);
  color:var(--red2);
  border-radius:999px;
  padding:10px 13px;
  font-weight:950;
  white-space:nowrap;
}
.toolBtn.on{
  background:var(--red);
  color:white;
  border-color:var(--red);
}
.activeFilters{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:-3px;
}
.filterTag{
  display:inline-flex;
  align-items:center;
  gap:5px;
  border-radius:999px;
  padding:6px 9px;
  background:rgba(201,88,82,.12);
  color:var(--red2);
  font-size:12px;
  font-weight:950;
}
.filterPanel{
  display:none;
  background:rgba(255,250,244,.9);
  border:1px solid rgba(159,63,70,.12);
  border-radius:24px;
  padding:13px;
  box-shadow:var(--soft);
}
.filterPanel.open{display:block}
.filterGroup{
  margin-bottom:13px;
}
.filterGroup:last-child{margin-bottom:0}
.filterTitle{
  color:var(--wine);
  font-weight:950;
  margin-bottom:8px;
}
.filterChips{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
}
.filterChip{

function loadState(){
  try{
    const cur=localStorage.getItem(KEY);
    if(cur) return normalize(JSON.parse(cur));
    for(const k of OLD_KEYS){
      const old=localStorage.getItem(k);
      if(old){
        const o=JSON.parse(old);
        return normalize({books:o.books||[],current:o.current||null});
      }
    }
  }catch(e){}
  return normalize({books:[],current:null});
}
function normalize(s){
  s.books=Array.isArray(s.books)?s.books:[];
  s.current=s.current||null;
  s.books=s.books.map(normalizeBook);
  if(s.current) s.current=normalizeCurrent(s.current);
  return s;
}
function normalizeBook(b){
  b.id=b.id||id();
  b.title=b.title||'';
  b.author=b.author||'';
  b.stars=+b.stars||0;
  b.heat=+b.heat||0;
  b.cry=+b.cry||0;
  b.speed=+b.speed||0;
  b.bottomLine=b.bottomLine||'';
  b.about=b.about||b.heroine||'';
  b.madeMe=b.madeMe||b.linger||'';
  b.characters=Array.isArray(b.characters)?b.characters:[];
  b.readingLog=Array.isArray(b.readingLog)?b.readingLog:(Array.isArray(b.updates)?b.updates:[]);
  b.createdAt=b.createdAt||new Date().toISOString();
  return b;
}
function normalizeCurrent(c){
  c.id=c.id||id();
  c.title=c.title||'';
  c.author=c.author||'';
  c.percent=pct(c.percent);
  c.lastMood=c.lastMood||'';
  c.updates=Array.isArray(c.updates)?c.updates:[];
  c.characters=Array.isArray(c.characters)?c.characters:[];
  c.startedAt=c.startedAt||new Date().toISOString();
  return c;
}
function save(){localStorage.setItem(KEY,JSON.stringify(S))}
function id(){return Date.now()+'-'+Math.random().toString(36).slice(2)}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function pct(n){return Math.max(0,Math.min(100,parseInt(n)||0))}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window.__toast);window.__toast=setTimeout(()=>t.classList.remove('show'),1400)}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.screen===id));
  document.body.classList.toggle('homeEditorialMode', id==='home');
  currentScreen=id;
  if(id==='home')renderHome();
  if(id==='field')renderField();
  if(id==='summary')renderSummary();
  if(id==='shelf')renderShelf();
  if(id==='stats')renderStats();
  scrollTo(0,0);
}

function iconStack(type,n){
  n=+n||0;
  return `<span class="ratingStack">${Array.from({length:n},()=>miniIcon(type)).join('')}</span>`;
}
function ratingsLine(b){
  const a=[];
  if(b.stars)a.push(iconStack('heart',b.stars));
  if(b.heat)a.push(iconStack('pepper',b.heat));
  if(b.cry)a.push(iconStack('broken',b.cry));
  return a.length?`<span class="ratingLine">${a.join('')}</span>`:'';
}

  return [

}

function matchesShelfFilters(b){
  const f=shelfFilters;
  if(f.bottomLine && b.bottomLine!==f.bottomLine) return false;
  if(f.stars && (+b.stars||0)!==f.stars) return false;
  if(f.heat && (+b.heat||0)!==f.heat) return false;
  if(f.cry && (+b.cry||0)!==f.cry) return false;
  if(f.speed && (+b.speed||0)!==f.speed) return false;
  if(f.char){
    const chars=b.characters||[];
    if(f.char==='redflag' && !chars.some(c=>String(c.tag||'').includes('דגל אדום')||String(c.finalTag||'').includes('דגל אדום'))) return false;
    if(f.char==='bookbf' && !chars.some(c=>String(c.tag||'').toLowerCase().includes('book boyfriend')||String(c.tag||'').toLowerCase().includes('book girlfriend'))) return false;
    if(f.char==='stuck' && !chars.some(c=>String(c.finalTag||'').includes('נשאר'))) return false;
  }
  return true;
}
function sortShelfBooks(arr){
  return [...arr].sort((a,b)=>{
    if(shelfSort==='recent') return new Date(b.createdAt||0)-new Date(a.createdAt||0);
    if(shelfSort==='love') return (+b.stars||0)-(+a.stars||0);
    if(shelfSort==='heat') return (+b.heat||0)-(+a.heat||0);
    if(shelfSort==='cry') return (+b.cry||0)-(+a.cry||0);
    if(shelfSort==='fast') return (+b.speed||0)-(+a.speed||0);
    if(shelfSort==='slow') return (+a.speed||9)-(+b.speed||9);
    if(shelfSort==='title') return String(a.title||'').localeCompare(String(b.title||''),'he');
    if(shelfSort==='author') return String(a.author||'').localeCompare(String(b.author||''),'he');
    return 0;
  });
}

function renderStats(){
  const el=document.getElementById('stats');
  if(!el)return;
  const books=Array.isArray(S.books)?S.books:[];
  const total=books.length;
  const avg=(key)=>{
    const vals=books.map(b=>+b[key]||0).filter(v=>v>0);
    return vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):'—';
  };
  const maxBook=(key,min=false)=>{
    const vals=books.filter(b=>(+b[key]||0)>0);
    if(!vals.length)return null;
    return vals.sort((a,b)=>min?(+a[key]||0)-(+b[key]||0):(+b[key]||0)-(+a[key]||0))[0];
  };
  const allLogs=books.flatMap(b=>b.readingLog||[]);
  const allChars=books.flatMap(b=>b.characters||[]);
  const textOf=(x)=>`${x?.text||''} ${x?.label||''}`;
  const countLogs=(re)=>allLogs.filter(u=>re.test(textOf(u))).length;
  const countBooks=(re)=>books.filter(b=>re.test(`${b.bottomLine||''} ${b.about||''} ${b.madeMe||''}`)).length;
  const redFlags=allChars.filter(ch=>/דגל אדום|בעייתי/.test(`${ch.tag||''} ${ch.finalTag||''}`)).length + countLogs(/דגל אדום|בעייתי/)+countBooks(/דגל אדום|בעייתי/);
  const noTalk=countLogs(/לא לדבר איתי/)+countBooks(/לא לדבר איתי/);
  const swallowed=books.filter(b=>(+b.speed||0)>=4).length;
  const aftermath=books.filter(b=>/נשאר לי בראש|לא התאוששתי|הייתי עוברת לגור שם|צריכה ספר המשך עכשיו/.test(b.bottomLine||'')).length;
  const commonText=(arr, pick)=>{
    const map={};
    arr.forEach(item=>{const k=(pick(item)||'').trim(); if(k) map[k]=(map[k]||0)+1;});
    const entries=Object.entries(map).sort((a,b)=>b[1]-a[1]);
    return entries[0]||null;
  };
  const topMood=commonText(allLogs.filter(u=>u.type==='mood'),u=>u.text||u.label);
  const topStamp=commonText(books,b=>b.bottomLine);
  const topCharacter=commonText(allChars,ch=>ch.name);
  const topLine=()=>{
    if(!total)return 'המדף עוד מתחמם. תני לו ספר אחד והוא יתחיל לדבר.';

    if((parseFloat(avg('cry'))||0)>=4) return 'הרבה לב, הרבה דמעות, מעט מאוד שינה. הספקת יפה.';
    if(swallowed>=Math.max(2,Math.ceil(total*0.45))) return 'כשספר תופס אותך, את לא קוראת — את בולעת.';
    if((parseFloat(avg('stars'))||0)>=4) return 'המדף שלך מפונק. לא כל ספר עובר את ועדת שימי.';
    return 'יש פה מדף עם אישיות, טעם, וקצת ענייני התקשרות.';

  const vibeDiagnosis=()=>{
    if(!total) return 'עוד אין אבחון. חסר פה ספר ראשון.';
    const parts=[];
    if(swallowed) parts.push(`בלעת ${swallowed} ספר${swallowed>1?'ים':''}`);

    <div class="fullSection backupBox statsBackupV25">
      <div class="fullTitle">גיבוי ושחזור</div>
      <div class="backupNote">שומר קובץ JSON עם כל המדף, הספר הנוכחי, רגעים, דמויות, דירוגים וסטטיסטיקות. בשחזור — הנתונים הקיימים יוחלפו.</div>
      <div class="backupActions">
        <button class="backupBtn" onclick="exportBackup()">${uiIcon('backup')} גיבוי הנתונים</button>
        <button class="backupBtn restore" onclick="chooseRestoreFile()">${uiIcon('restore')} שחזור מגיבוי</button>
      </div>
    </div>
  `;
}
function statsMetricCard(value,label,sub,icon){
  return `<div class="statsMetricCard"><div class="statsMetricIcon">${uiIcon(icon)}</div><div class="statsMetricValue">${value}</div><div class="statsMetricLabel">${label}</div><div class="statsMetricSub">${sub}</div></div>`;
}
function statsFunCard(value,label,sub,icon){
  return `<div class="statsFunCard"><div class="statsFunTop"><span class="statsFunIcon">${uiIcon(icon)}</span><span class="statsFunValue">${value}</span></div><div class="statsFunLabel">${label}</div><div class="statsFunSub">${sub}</div></div>`;
}
function statsInsightRow(label,value,sub,icon){
  return `<div class="statsInsightRow"><div class="statsInsightIcon">${uiIcon(icon)}</div><div class="statsInsightText"><div class="statsInsightLabel">${label}</div><div class="statsInsightValue">${esc(value)}</div><div class="statsInsightSub">${esc(sub)}</div></div></div>`;
}
function statLeader(label,b,icon,meta){
  return `<div class="statsLeaderRow"><div class="statsLeaderIcon">${uiIcon(icon)}</div><div class="statsLeaderText"><div class="statsLeaderLabel">${label}</div><div class="statsLeaderBook">${b?esc(b.title):'—'}</div><div class="statsLeaderMeta">${meta}</div></div></div>`;
}


function exportBackup(){
  const payload={
    app:'עוד פרק אחד',
    version:14,
    exportedAt:new Date().toISOString(),
    data:S
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  const stamp=new Date().toISOString().slice(0,10);
  a.href=URL.createObjectURL(blob);
  a.download=`od-perek-ehad-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  toast('המדף נשמר 📚');
}
function chooseRestoreFile(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='application/json,.json';
  input.onchange=()=>{
    const file=input.files&&input.files[0];
    if(file) restoreFromFile(file);
  };
  input.click();
}
function restoreFromFile(file){
  if(!confirm('השחזור יחליף את הנתונים הקיימים באפליקציה. להמשיך?')) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const parsed=JSON.parse(String(reader.result||''));
      const data=parsed && parsed.data ? parsed.data : parsed;
      if(!data || !Array.isArray(data.books)) throw new Error('bad backup');
      S=normalize(data);
      localStorage.setItem(KEY,JSON.stringify(S));
      render();
      show('home');
      toast('המדף חזר למקום 📚');
    }catch(e){
      toast('הקובץ לא תקין, לא הצלחתי לשחזר');
    }
  };
  reader.onerror=()=>toast('לא הצלחתי לקרוא את הקובץ');
  reader.readAsText(file);
}

render();
show(currentScreen);
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
</body>
</html>
