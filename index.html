/* v2 — תוך כדי קריאה / עיצוב מחודש */
:root{
  --bg:#fbf0e8;
  --paper:#fffaf5;
  --paper2:#f3d9ce;
  --rose:#dfaaa0;
  --terra:#ad604c;
  --terra2:#c97d64;
  --ink:#321f1b;
  --cocoa:#55332b;
  --muted:#94756a;
  --line:#ead4cb;
  --shadow:0 20px 52px rgba(80,42,32,.14);
  --soft:0 9px 26px rgba(80,42,32,.09);
}
body{
  background:
    radial-gradient(circle at 15% 0%,rgba(173,96,76,.18),transparent 32%),
    radial-gradient(circle at 92% 9%,rgba(223,170,160,.26),transparent 26%),
    linear-gradient(180deg,#fbf0e8 0%,#f8e7de 100%);
}
.brand{
  font-size:42px;
}
.top{
  padding-top:2px;
}
.nowCard{
  background:
    radial-gradient(circle at left top,rgba(255,255,255,.38),transparent 30%),
    linear-gradient(145deg,#fffaf5 0%,#efd0c5 100%);
  border:1px solid rgba(173,96,76,.22);
  padding:18px;
}
.nowBookV2{
  position:relative;
  z-index:1;
}
.nowTitle{
  font-family:'Playfair Display',serif;
  font-size:34px;
  line-height:1.02;
  font-weight:900;
  letter-spacing:-.8px;
}
.nowAuthor{
  color:var(--muted);
  font-weight:800;
  margin-top:5px;
}
.progressWrap{
  margin:16px 0 12px;
}
.progressTop{
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:var(--cocoa);
  font-weight:900;
  font-size:13px;
  margin-bottom:7px;
}
.progressBar{
  height:12px;
  background:rgba(255,255,255,.62);
  border-radius:999px;
  overflow:hidden;
  border:1px solid rgba(173,96,76,.13);
}
.progressFill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--terra),var(--terra2));
  border-radius:999px;
}
.moodPill{
  display:inline-flex;
  padding:8px 11px;
  border-radius:999px;
  background:rgba(255,255,255,.68);
  color:var(--cocoa);
  font-weight:900;
  font-size:13px;
  margin:4px 0 10px;
}
.nowActions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
  margin-top:11px;
}
.nowActions .primary,
.nowActions .ghost{
  min-height:48px;
}
.readingTimeline{
  margin-top:14px;
  display:grid;
  gap:8px;
}
.timelineItem{
  background:rgba(255,250,245,.76);
  border:1px solid rgba(234,212,203,.9);
  border-radius:18px;
  padding:10px 11px;
  box-shadow:0 5px 14px rgba(80,42,32,.06);
}
.timelineMeta{
  color:var(--muted);
  font-size:12px;
  font-weight:900;
  margin-bottom:3px;
}
.timelineText{
  color:var(--ink);
  font-weight:800;
  line-height:1.35;
}
.quickGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.quickCard{
  border:1px solid var(--line);
  background:var(--paper);
  color:var(--cocoa);
  border-radius:22px;
  padding:14px;
  min-height:92px;
  text-align:right;
  box-shadow:var(--soft);
}
.quickIcon{
  font-size:24px;
  display:block;
  margin-bottom:8px;
}
.quickTitle{
  font-weight:900;
  font-size:16px;
}
.quickSub{
  color:var(--muted);
  font-size:12px;
  font-weight:800;
  margin-top:3px;
}
.moodGrid,.charGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:10px;
}
.moodBtn,.charBtn{
  border:1px solid var(--line);
  background:#fffaf5;
  color:var(--cocoa);
  border-radius:18px;
  padding:12px 10px;
  font-weight:900;
}
.percentBox{
  display:grid;
  gap:10px;
}
.percentHint{
  color:var(--muted);
  font-weight:800;
  font-size:13px;
}
.timelineFull{
  max-height:58dvh;
  overflow:auto;
  padding-left:3px;
}
.detailMiniGrid{
  display:grid;
  gap:9px;
}
.characterPill{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  background:rgba(255,250,245,.72);
  border:1px solid var(--line);
  border-radius:18px;
  padding:10px 12px;
}
.characterName{
  font-weight:900;
  color:var(--ink);
}
.characterTag{
  font-weight:900;
  color:var(--terra);
  font-size:13px;
}
.addShelf{
  background:rgba(255,250,245,.9);
  color:var(--terra);
  border:1px solid rgba(173,96,76,.20);
}
.emptyNow{
  position:relative;
  z-index:1;
}

function jsEsc(s){return String(s||'').replaceAll('\\\\','\\\\\\\\').replaceAll("'","\\'").replaceAll('\n',' ')}
function id(){return Date.now()+'-'+Math.random().toString(36).slice(2)}
function header(){return `<div class="top"><div class="eyebrow">יומן הקריאה של שימי</div><div class="brand">עוד פרק אחד</div><div class="sub">ספרים, רגשות, ומה קרה לי בדרך</div></div>`}
function ensureCurrent(){if(!S.current)return null;S.current.percent=Number(S.current.percent||0);S.current.updates=Array.isArray(S.current.updates)?S.current.updates:[];S.current.characters=Array.isArray(S.current.characters)?S.current.characters:[];return S.current}
function showScreen(s){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));document.getElementById('s-'+s).classList.add('active');document.querySelectorAll('.navBtn').forEach(b=>b.classList.toggle('on',b.dataset.screen===s));render();scrollTo(0,0)}
function render(){renderHome();renderLibrary();renderStats();renderSearch()}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window.__t);window.__t=setTimeout(()=>t.classList.remove('show'),1900)}
function sheet(html){document.getElementById('sheetBody').innerHTML=`<div class="handle"></div>${html}`;document.getElementById('sheet').classList.add('open')}
function hideSheet(){document.getElementById('sheet').classList.remove('open')}
function colorFor(b){const type=(b.tags||[]).find(t=>ROMANCE_COLORS[t]);return type?ROMANCE_COLORS[type]:'#b46a55'}
function mainTag(b){return(b.tags&&b.tags.length)?b.tags[0]:''}
function ratingsText(b,o={}){let r='';if(b.stars)r+='⭐'.repeat(b.stars);if(b.heat)r+=(r?' ':'')+'🔥'.repeat(b.heat);if(o.cry&&b.cry)r+=(r?' ':'')+'😭'.repeat(b.cry);if(o.speed&&b.speed)r+=(r?' ':'')+SPEED_LABELS[b.speed-1];return r||'—'}
function sortBooks(arr,sort){return[...arr].sort((x,y)=>{if(sort==='recent')return new Date(y.createdAt||0)-new Date(x.createdAt||0);if(sort==='love')return(y.stars||0)-(x.stars||0)||new Date(y.createdAt||0)-new Date(x.createdAt||0);if(sort==='heat')return(y.heat||0)-(x.heat||0)||new Date(y.createdAt||0)-new Date(x.createdAt||0);if(sort==='cry')return(y.cry||0)-(x.cry||0)||new Date(y.createdAt||0)-new Date(x.createdAt||0);if(sort==='fast')return(y.speed||0)-(x.speed||0)||new Date(y.createdAt||0)-new Date(x.createdAt||0);if(sort==='slow')return(x.speed||9)-(y.speed||9)||new Date(y.createdAt||0)-new Date(x.createdAt||0);return 0})}
function pct(n){return Math.max(0,Math.min(100,Number(n)||0))}
function formatDate(ts){try{return new Date(ts).toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'})}catch{return ''}}

function bookCard(b){return `<div class="bookMini" style="background:${colorFor(b)}" onclick="openDetail('${b.id}')"><div><div class="bookTag">${esc(mainTag(b)||'עוד פרק')}</div></div><div><div class="bookTitle">${esc(b.title)}</div><div class="bookAuthor">${esc(b.author)}</div></div><div class="bookRatings">${ratingsText(b)}</div></div>`}
function listRow(b){return `<div class="listRow" onclick="openDetail('${b.id}')"><div class="colorDot" style="background:${colorFor(b)}"></div><div class="listMain"><div class="listTitle">${esc(b.title)}</div><div class="listAuthor">${esc(b.author)}</div><div style="margin-top:4px">${mainTag(b)?`<span class="tagSmall">${esc(mainTag(b))}</span>`:''}</div></div><div class="listMeta">${ratingsText(b,{cry:true})}</div></div>`}

function renderHome(){
  const recent=[...S.books].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,6);
  const cur=ensureCurrent();
  document.getElementById('s-home').innerHTML=`${header()}${cur?currentCard(cur):emptyCurrentCard()}<button class="addShelf" onclick="startBookFlow()">＋ להוסיף למדף</button><div class="sectionHead"><div class="sectionTitle">נוספו לאחרונה</div><button class="textLink" onclick="showScreen('library')">כל הספרייה ←</button></div>${recent.length?`<div class="hScroll">${recent.map(bookCard).join('')}</div>`:`<div class="card empty"><strong>המדף שלך מחכה לספר הראשון</strong>לחצי על להוסיף למדף או התחילי לקרוא</div>`}`
}
function emptyCurrentCard(){
  return `<div class="nowCard"><div class="nowLbl">קוראת עכשיו</div><div class="emptyNow">רק עוד פרק אחד…<br>במה מתחילות?</div><button class="primary" onclick="openCurrentModal()">אני מתחילה לקרוא</button></div>`
}
function currentCard(cur){
  const last=cur.updates?.[0];
  const timeline=(cur.updates||[]).slice(0,3).map(timelineItem).join('');
  return `<div class="nowCard"><div class="nowBookV2"><div class="nowLbl">קוראת עכשיו</div><div class="nowTitle">${esc(cur.title)}</div><div class="nowAuthor">${esc(cur.author)}</div><div class="progressWrap"><div class="progressTop"><span>התקדמות</span><span>${pct(cur.percent)}%</span></div><div class="progressBar"><div class="progressFill" style="width:${pct(cur.percent)}%"></div></div></div>${cur.lastMood?`<div class="moodPill">מצב אחרון: ${esc(cur.lastMood)}</div>`:''}<div class="nowActions"><button class="primary" onclick="openReadingHub()">עדכון קריאה</button><button class="ghost" onclick="finishCurrent()">סיימתי</button></div><button class="textLink" onclick="confirmSwitchCurrent()">שיניתי כיוון</button>${timeline?`<div class="sectionHead"><div class="sectionTitle">ציר קריאה</div><button class="textLink" onclick="openTimeline()">הכול ←</button></div><div class="readingTimeline">${timeline}</div>`:''}</div></div>`
}
function timelineItem(u){
  const meta=[u.percent!==undefined&&u.percent!==null?u.percent+'%':'',formatDate(u.ts),u.label||''].filter(Boolean).join(' · ');
  return `<div class="timelineItem"><div class="timelineMeta">${esc(meta)}</div><div class="timelineText">${esc(u.text||'')}</div></div>`
}
function openCurrentModal(p={title:'',author:''}){
  sheet(`<div class="sheetTitle">פותחות ספר</div><div class="sheetSub">שם, סופרת, ואפשר גם אחוז אם כבר התחלת.</div><div class="form"><input id="curTitle" class="input" placeholder="שם הספר" value="${esc(p.title||'')}"><input id="curAuthor" class="input" placeholder="סופרת" value="${esc(p.author||'')}"><input id="curPercent" class="input" type="number" min="0" max="100" placeholder="אחוז התקדמות" value="${p.percent||''}"><button class="primary" onclick="saveCurrent()">התחלתי לקרוא</button></div>`);
  setTimeout(()=>document.getElementById('curTitle')?.focus(),80)
}
function saveCurrent(){
  const title=document.getElementById('curTitle').value.trim(),author=document.getElementById('curAuthor').value.trim();
  if(!title){toast('חסר שם ספר');return}
  S.current={title,author,percent:pct(document.getElementById('curPercent').value||0),updates:[],characters:[],startedAt:new Date().toISOString()};
  save();hideSheet();render();toast('הספר על המדף עכשיו')
}
function confirmSwitchCurrent(){
  sheet(`<div class="sheetTitle">להחליף את הספר הנוכחי?</div><div class="sheetSub">הספר הנוכחי יוחלף, ולא ייכנס למדף עדיין.</div><div class="two"><button class="primary" onclick="hideSheet();openCurrentModal()">כן, שיניתי כיוון</button><button class="secondary" onclick="hideSheet()">חזרה לספר</button></div>`)
}
function finishCurrent(){startBookFlow(S.current||{})}

function addReadingUpdate(type,label,text,extra={}){
  const cur=ensureCurrent(); if(!cur)return;
  const p=extra.percent!==undefined?pct(extra.percent):pct(cur.percent||0);
  const item={id:id(),type,label,text,percent:p,ts:new Date().toISOString(),...extra};
  cur.updates.unshift(item);
  cur.updates=cur.updates.slice(0,120);
  if(extra.percent!==undefined)cur.percent=p;
  if(type==='mood')cur.lastMood=label;
  save();hideSheet();render();toast('נשמר לציר הקריאה')
}
function openReadingHub(){
  const cur=ensureCurrent(); if(!cur)return;
  sheet(`<div class="sheetTitle">עדכון קריאה</div><div class="sheetSub">${esc(cur.title)} · ${pct(cur.percent)}%</div><div class="quickGrid">
    <button class="quickCard" onclick="openPercentUpdate()"><span class="quickIcon">％</span><div class="quickTitle">התקדמתי</div><div class="quickSub">לעדכן אחוז</div></button>
    <button class="quickCard" onclick="openMoodUpdate()"><span class="quickIcon">💓</span><div class="quickTitle">מצב הספר</div><div class="quickSub">מכורה / נמרח / וואו</div></button>
    <button class="quickCard" onclick="openTextUpdate('note')"><span class="quickIcon">🗯️</span><div class="quickTitle">בא לי לפרוק</div><div class="quickSub">טקסט חופשי</div></button>
    <button class="quickCard" onclick="openTextUpdate('quote')"><span class="quickIcon">❞</span><div class="quickTitle">ציטוט שאהבתי</div><div class="quickSub">משפט ששווה לשמור</div></button>
    <button class="quickCard" onclick="openCharacterUpdate()"><span class="quickIcon">👀</span><div class="quickTitle">דמות</div><div class="quickSub">מי עושה לך משהו?</div></button>
    <button class="quickCard" onclick="openTimeline()"><span class="quickIcon">📜</span><div class="quickTitle">ציר קריאה</div><div class="quickSub">כל מה ששמרת</div></button>
  </div>`)
}
function openPercentUpdate(){
  const cur=ensureCurrent();
  sheet(`<div class="sheetTitle">איפה את בספר?</div><div class="sheetSub">רק אחוז, בלי שיעורי בית.</div><div class="percentBox"><input id="percentInput" class="input" type="number" min="0" max="100" value="${pct(cur.percent)}"><div class="percentHint">אפשר גם להשאיר רק עדכון התקדמות בלי טקסט.</div><textarea id="percentNote" class="textarea" placeholder="משהו קצר על איפה זה תופס אותך? לא חובה"></textarea><button class="primary" onclick="savePercentUpdate()">שמירה</button></div>`)
}
function savePercentUpdate(){
  const p=pct(document.getElementById('percentInput').value);
  const note=(document.getElementById('percentNote').value||'').trim();
  addReadingUpdate('progress','התקדמות',note||`הגעתי ל־${p}%`,{percent:p})
}
function openMoodUpdate(){
  sheet(`<div class="sheetTitle">מה מצב הספר?</div><div class="sheetSub">לחיצה אחת וזה נשמר לציר.</div><div class="moodGrid">${MOODS.map(m=>`<button class="moodBtn" onclick="saveMood('${jsEsc(m)}')">${esc(m)}</button>`).join('')}</div>`)
}
function saveMood(m){addReadingUpdate('mood',m,m)}
function openTextUpdate(type){
  const isQuote=type==='quote';
  sheet(`<div class="sheetTitle">${isQuote?'ציטוט שאהבתי':'בא לי לפרוק'}</div><div class="sheetSub">${isQuote?'משפט קטן שנרצה לזכור.':'כאן מותר לצעוק על דמויות בדיוניות.'}</div><div class="form"><textarea id="freeText" class="textarea" placeholder="${isQuote?'הציטוט…':'מה קרה עכשיו?'}"></textarea><button class="primary" onclick="saveTextUpdate('${type}')">שמירה</button></div>`)
}
function saveTextUpdate(type){
  const text=(document.getElementById('freeText').value||'').trim();
  if(!text){toast('אין מה לשמור');return}
  addReadingUpdate(type,type==='quote'?'ציטוט':'פריקה',text)
}
function openCharacterUpdate(){
  sheet(`<div class="sheetTitle">דמות</div><div class="sheetSub">שם + איך את מרגישה לגביה כרגע.</div><div class="form"><input id="charName" class="input" placeholder="שם הדמות"><div class="charGrid">${CHAR_TAGS.map(t=>`<button class="charBtn" onclick="saveCharacter('${jsEsc(t)}')">${esc(t)}</button>`).join('')}</div></div>`)
}
function saveCharacter(tag){
  const cur=ensureCurrent(); if(!cur)return;
  const name=(document.getElementById('charName').value||'').trim();
  if(!name){toast('חסר שם דמות');return}
  cur.characters.unshift({id:id(),name,tag,ts:new Date().toISOString(),percent:pct(cur.percent||0)});
  cur.characters=cur.characters.slice(0,60);
  addReadingUpdate('character','דמות',`${name} · ${tag}`,{characterName:name,characterTag:tag});
}
function openTimeline(){
  const cur=ensureCurrent(); if(!cur)return;
  const items=cur.updates||[];
  sheet(`<div class="sheetTitle">ציר קריאה</div><div class="sheetSub">${esc(cur.title)} · ${pct(cur.percent)}%</div><div class="timelineFull">${items.length?items.map(timelineItem).join(''):`<div class="card empty"><strong>עוד אין רגעים שמורים</strong>לחצי עדכון קריאה כשיש רגע.</div>`}</div>`)
}

function startBookFlow(p={}){
  draft={title:p.title||'',author:p.author||'',tags:[],stars:0,heat:0,cry:0,speed:0,heroine:'',hero:'',heartbreak:'',linger:'',readingLog:p.updates||[],characters:p.characters||[],percent:p.percent||0,startedAt:p.startedAt||null};
  qStep=0;openTagGroup=0;renderQuestion();document.getElementById('sheet').classList.add('open')
}
const QUESTIONS=[{id:'title',q:'שם הספר?',type:'text',ph:'שם הספר'},{id:'author',q:'סופרת?',type:'text',ph:'שם הסופרת'},{id:'tags',q:'תגיות',type:'tags'},{id:'ratings',q:'כמה כוכבים, לוהט, בכי ומהירות?',type:'ratings'},{id:'heroine',q:'מי הגיבורה?',type:'textarea',ph:'שם + תיאור קצר…'},{id:'hero',q:'מי הגיבור?',type:'textarea',ph:'שם + תיאור קצר…'},{id:'heartbreak',q:'מה שבר להם את הלב?',type:'textarea',ph:'הסוד, הפחד, העבר, הטעות…'},{id:'linger',q:'מה נשאר איתי מהספר?',type:'textarea',ph:'כאן כותבים את מה שלא נכנס לדירוגים',optional:true}];
function renderQuestion(){
  const q=QUESTIONS[qStep],dots=QUESTIONS.map((_,i)=>`<div class="qDot ${i<qStep?'done':i===qStep?'now':''}"></div>`).join('');
  let content='';
  if(q.type==='text')content=`<input id="qInput" class="input" value="${esc(draft[q.id]||'')}" placeholder="${q.ph}">`;
  if(q.type==='textarea')content=`<textarea id="qInput" class="textarea" placeholder="${q.ph}">${esc(draft[q.id]||'')}</textarea>`;
  if(q.type==='tags')content=tagPicker();
  if(q.type==='ratings')content=ratingPicker();
  const prev=qStep>0?`<button class="secondary" onclick="prevQ()">חזרה</button>`:`<button class="ghost" onclick="hideSheet()">ביטול</button>`,next=qStep===QUESTIONS.length-1?'שמרי למדף':'הבאה';
  document.getElementById('sheetBody').innerHTML=`<div class="handle"></div>${previewCard()}<div class="qProg">${dots}</div><div class="qText">${q.q}</div>${content}<div class="sheetNav">${prev}<button class="primary" onclick="nextQ()">${next}</button></div>`
}
function previewCard(){
  const b={title:draft.title||'',author:draft.author||'',tags:draft.tags||[],stars:draft.stars||0,heat:draft.heat||0};
  return `<div class="preview" style="background:${colorFor(b)}"><div><div class="bookTag">${esc(mainTag(b)||'ביקורת אישית')}</div></div><div><div class="bookTitle">${esc(draft.title||'')}</div><div class="bookAuthor">${esc(draft.author||'')}</div></div><div class="bookRatings">${ratingsText(b)}</div></div>`
}
function saveQ(){const q=QUESTIONS[qStep];if(['text','textarea'].includes(q.type)){const el=document.getElementById('qInput');draft[q.id]=(el?.value||'').trim()}}
function nextQ(){saveQ();if(qStep===0&&!draft.title){toast('חסר שם הספר');return}if(qStep<QUESTIONS.length-1){qStep++;renderQuestion();return}submitBook()}
function prevQ(){saveQ();if(qStep>0){qStep--;renderQuestion()}}
function tagPicker(){return TAG_GROUPS.map((g,i)=>`<div class="groupBox ${i===openTagGroup?'open':''}"><div class="groupHead" onclick="openTagGroup=${i};renderQuestion()"><span>${g.name}</span><span>⌄</span></div><div class="groupBody">${g.tags.map(t=>`<button class="chip ${draft.tags.includes(t)?'on':''}" onclick="toggleTag('${jsEsc(t)}')">${t}</button>`).join('')}</div></div>`).join('')}
function toggleTag(t){const i=draft.tags.indexOf(t);if(i>-1)draft.tags.splice(i,1);else draft.tags.push(t);renderQuestion()}
function ratingPicker(){const group=(id,label,items)=>`<div><div class="ratingLbl">${label}</div><div class="ratingRow">${items.map((x,i)=>`<button class="rateBtn ${draft[id]===i+1?'on':''}" onclick="draft['${id}']=${i+1};renderQuestion()">${x}</button>`).join('')}</div></div>`;return `<div class="ratingsGroup">${group('stars','כוכבים ⭐',['1⭐','2⭐','3⭐','4⭐','5⭐'])}${group('heat','לוהט 🔥',['1🔥','2🔥','3🔥','4🔥','5🔥'])}${group('cry','בכי 😭',['😐','🥹','😢','😭','🌊'])}${group('speed','מהירות קריאה',SPEED_LABELS)}</div>`}
function submitBook(){
  const b={...draft,id:id(),createdAt:new Date().toISOString()};
  S.books.unshift(b);
  if(S.current&&S.current.title===draft.title)S.current=null;
  save();hideSheet();showScreen('home');toast('עוד ספר נכנס למדף של שימי ✓')
}

function renderLibrary(){
  const books=sortBooks(S.books,S.librarySort),avg=avgStats(S.books);
  document.getElementById('s-library').innerHTML=`${header()}<div class="libraryTop"><div class="summary">${S.books.length} ספרים · ממוצע ${avg.stars}⭐ · הכי לוהט ${avg.maxHeat}🔥</div><div class="tools"><button class="pillBtn" onclick="sortSheet('library')">מיון</button><div class="toggle"><button class="${S.libraryView==='grid'?'on':''}" onclick="S.libraryView='grid';save();render()">כרטיסים</button><button class="${S.libraryView==='list'?'on':''}" onclick="S.libraryView='list';save();render()">רשימה</button></div></div></div>${books.length?(S.libraryView==='grid'?`<div class="grid">${books.map(bookCard).join('')}</div>`:`<div class="list">${books.map(listRow).join('')}</div>`):`<div class="card empty"><strong>המדף עדיין ריק, אבל יש לו פוטנציאל</strong></div>`}`
}
function avgStats(arr){const a=arr.length?arr.reduce((s,b)=>s+(b.stars||0),0)/arr.length:0;return{stars:a?a.toFixed(1):'—',maxHeat:arr.length?Math.max(...arr.map(b=>b.heat||0)):0}}
function sortSheet(context){const cur=context==='library'?S.librarySort:S.searchSort,opts=context==='library'?['recent','love','heat','cry']:['recent','love','heat','cry','fast','slow'];sheet(`<div class="sheetTitle">מיון</div><div class="form">${opts.map(k=>`<button class="${cur===k?'primary':'secondary'}" onclick="setSort('${context}','${k}')">${SORTS[k]}</button>`).join('')}</div>`)}
function setSort(ctx,k){if(ctx==='library')S.librarySort=k;else S.searchSort=k;save();hideSheet();render()}

function openDetail(bookId){
  const b=S.books.find(x=>x.id===bookId);if(!b)return;
  sheet(`<div class="detailHero" style="background:${colorFor(b)}"><div class="bookTag">${esc(mainTag(b)||'עוד פרק')}</div><div class="detailTitle">${esc(b.title)}</div><div class="detailAuthor">${esc(b.author)}</div><div class="detailRatings">${ratingsText(b,{cry:true,speed:true})}</div></div><div class="detailBody">${detailSec('גיבורה',b.heroine)}${detailSec('גיבור',b.hero)}${detailSec('מה שבר להם את הלב?',b.heartbreak)}${b.tags?.length?`<div class="detailSec"><div class="detailLbl">תגיות</div><div class="filterChips">${b.tags.map(t=>`<span class="tagSmall">${esc(t)}</span>`).join('')}</div></div>`:''}${detailSec('מה נשאר איתי מהספר?',b.linger)}${charactersBlock(b)}${readingLogBlock(b)}<button class="danger" onclick="confirmDelete('${b.id}')">מחקי ספר זה</button></div>`)
}
function detailSec(lbl,txt){return txt?`<div class="detailSec"><div class="detailLbl">${lbl}</div><div class="detailTxt">${esc(txt)}</div></div>`:''}
function charactersBlock(b){const chars=b.characters||[];if(!chars.length)return '';return `<div class="detailSec"><div class="detailLbl">דמויות שתפסו מקום</div><div class="detailMiniGrid">${chars.map(c=>`<div class="characterPill"><span class="characterName">${esc(c.name)}</span><span class="characterTag">${esc(c.tag)}</span></div>`).join('')}</div></div>`}
function readingLogBlock(b){const log=b.readingLog||[];if(!log.length)return '';return `<div class="detailSec"><div class="detailLbl">ציר הקריאה</div><div class="readingTimeline">${log.slice(0,12).map(timelineItem).join('')}</div></div>`}
function confirmDelete(bookId){sheet(`<div class="sheetTitle">רגע, הספר הזה באמת עוזב?</div><div class="sheetSub">אפשר לבטל ולחזור לפרטים.</div><div class="two"><button class="danger" onclick="deleteBook('${bookId}')">כן, מחקי</button><button class="secondary" onclick="hideSheet()">חזרה לספר</button></div>`)}
function deleteBook(bookId){S.books=S.books.filter(b=>b.id!==bookId);save();hideSheet();render();toast('נמחק מהמדף')}

function renderStats(){
  const yr=last12(S.books),avg=avgFull(yr),author=topAuthor(yr),funny=funnyLine(yr,avg),leaders=[['הכי לוהט 🔥',leadersBy(yr,'heat','max')],['הכי בכי 😭',leadersBy(yr,'cry','max')],['הכי אהבתי ⭐',leadersBy(yr,'stars','max')],['הכי מהיר 🚀',leadersBy(yr,'speed','max')],['הכי איטי 🐢',leadersBy(yr,'speed','min')]];
  document.getElementById('s-stats').innerHTML=`${header()}<div class="statsHero"><div class="statsTitle">השנה שלי בספרים</div><div class="statsLine">${funny}</div></div><div class="statsGrid"><div class="statCard"><div class="statNum">${yr.length}</div><div class="statLbl">ספרים ב־12 חודשים</div></div><div class="statCard"><div class="statNum">${avg.stars}</div><div class="statLbl">ממוצע ⭐</div></div><div class="statCard"><div class="statNum">${avg.heat}</div><div class="statLbl">ממוצע 🔥</div></div><div class="statCard"><div class="statNum">${avg.cry}</div><div class="statLbl">ממוצע 😭</div></div></div><div class="card"><div class="sectionTitle">הסופרת הכי נקראת</div><div class="leader"><div class="leaderItem"><div class="leaderVal">${esc(author||'עוד אין מספיק נתונים')}</div></div></div></div><div class="card"><div class="sectionTitle">המדדים הרגשיים</div><div class="leader">${leaders.map(([l,arr])=>`<div class="leaderItem"><div class="leaderLbl">${l}</div><div class="leaderVal">${arr.length?arr.map(b=>esc(b.title)).join(' · '):'—'}</div></div>`).join('')}</div></div>`
}
function last12(arr){const cutoff=new Date();cutoff.setMonth(cutoff.getMonth()-12);return arr.filter(b=>new Date(b.createdAt)>=cutoff)}
function avgFull(arr){function a(k){const vals=arr.map(b=>+b[k]||0).filter(Boolean);return vals.length?(vals.reduce((x,y)=>x+y,0)/vals.length).toFixed(1):'—'}return{stars:a('stars'),heat:a('heat'),cry:a('cry')}}
function topAuthor(arr){const m={};arr.forEach(b=>{if(b.author)m[b.author]=(m[b.author]||0)+1});return Object.keys(m).sort((a,b)=>m[b]-m[a])[0]||''}
function leadersBy(arr,k,type){const vals=arr.map(b=>+b[k]||0).filter(Boolean);if(!vals.length)return[];const target=type==='min'?Math.min(...vals):Math.max(...vals);return arr.filter(b=>(+b[k]||0)===target)}
function funnyLine(arr,avg){if(!arr.length)return 'המדף עוד מתחמם. תני לו ספר אחד והוא יתחיל לדבר.';if((+avg.heat||0)>=4)return 'השנה המדף שלך אמר: החלטות מפוקפקות, הרבה 🔥, ואפס התנצלות.';if((+avg.cry||0)>=4)return 'הרבה בכי, הרבה דרמה, מעט מאוד שינה. מדף עם רגשות.';return 'השנה קראת, דירגת, ונתת למדף שלך אופי. מכובד מאוד.'}

function renderSearch(){
  const old=document.getElementById('searchInput'),q=(old?.value||'').trim().toLowerCase();
  let res=S.books.filter(b=>matchesSearch(b,q)&&matchesFilters(b));
  res=sortBooks(res,S.searchSort);
  const active=[...S.filters.tags];['stars','heat','cry','speed'].forEach(k=>{if(S.filters[k])active.push(k+' '+S.filters[k])});
  document.getElementById('s-search').innerHTML=`${header()}<div class="searchRow"><input id="searchInput" class="input searchInput" placeholder="חפשי ספר, סופרת או תגית" value="${esc(q)}" oninput="renderSearch()"><button class="pillBtn" onclick="toggleFilters()">סינון</button><button class="pillBtn" onclick="sortSheet('search')">מיון</button></div>${active.length?`<div class="filterChips">${active.map(x=>`<span class="tagSmall">${esc(x)}</span>`).join('')}<button class="textLink" onclick="resetSearch()">להתחיל מחדש</button></div>`:''}<div id="filterPanel" class="filtersOpen">${filterPanel()}</div>${res.length?(S.libraryView==='grid'?`<div class="grid">${res.map(bookCard).join('')}</div>`:`<div class="list">${res.map(listRow).join('')}</div>`):`<div class="card empty"><strong>המדף שקט פה… נסי חיפוש אחר</strong></div>`}`;
  if(window.__filtersOpen)document.getElementById('filterPanel').classList.add('open')
}
function matchesSearch(b,q){if(!q)return true;return[b.title,b.author,...(b.tags||[])].join(' ').toLowerCase().includes(q)}
function matchesFilters(b){const f=S.filters;if(f.tags.length&&!f.tags.every(t=>(b.tags||[]).includes(t)))return false;for(const k of['stars','heat','cry','speed'])if(f[k]&&(+b[k]||0)!==f[k])return false;return true}
function toggleFilters(){window.__filtersOpen=!window.__filtersOpen;renderSearch()}
function filterPanel(){const rating=(k,label)=>`<div class="groupBox open"><div class="groupHead">${label}</div><div class="groupBody">${[1,2,3,4,5].map(v=>`<button class="chip ${S.filters[k]===v?'on':''}" onclick="S.filters['${k}']=${S.filters[k]===v?0:v};save();renderSearch()">${v}</button>`).join('')}</div></div>`;return TAG_GROUPS.map((g,i)=>`<div class="groupBox ${i===0?'open':''}"><div class="groupHead" onclick="this.parentElement.classList.toggle('open')"><span>${g.name}</span><span>⌄</span></div><div class="groupBody">${g.tags.map(t=>`<button class="chip ${S.filters.tags.includes(t)?'on':''}" onclick="toggleFilterTag('${jsEsc(t)}')">${t}</button>`).join('')}</div></div>`).join('')+rating('stars','כוכבים')+rating('heat','לוהט')+rating('cry','בכי')+rating('speed','מהירות')}
function toggleFilterTag(t){const i=S.filters.tags.indexOf(t);if(i>-1)S.filters.tags.splice(i,1);else S.filters.tags.push(t);save();renderSearch()}
function resetSearch(){S.filters={tags:[],stars:0,heat:0,cry:0,speed:0};S.searchSort='love';window.__filtersOpen=false;save();renderSearch()}

render();
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});

</script></body></html>
