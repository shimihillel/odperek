<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#9f3f46">
<title>עוד פרק אחד v12</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
:root{
  --bg:#fff4eb;
  --cream:#fffaf4;
  --cream2:#f8e4d6;
  --ink:#2a1715;
  --muted:#8b655a;
  --line:#ead1c4;
  --red:#c95852;
  --red2:#9f3f46;
  --wine:#762d3f;
  --rose:#e4aaa0;
  --sand:#ffe1a6;
  --shadow:0 18px 45px rgba(76,34,28,.14);
  --soft:0 9px 22px rgba(76,34,28,.08);
}
*{box-sizing:border-box;font-style:normal}
body{
  margin:0;
  min-height:100dvh;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 12% 6%,rgba(255,225,166,.62),transparent 24%),
    radial-gradient(circle at 88% 5%,rgba(159,63,70,.19),transparent 26%),
    radial-gradient(circle at 75% 92%,rgba(201,88,82,.18),transparent 28%),
    linear-gradient(145deg,#fffaf4 0%,#f2d7c8 100%);
}
button,input,textarea{font:inherit}
button{cursor:pointer}
.app{
  max-width:430px;
  margin:0 auto;
  min-height:100dvh;
  padding:18px 16px 92px;
  position:relative;
}
.screen{display:none}
.screen.active{display:block}
.top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:4px 0 18px;
}
.iconBtn{
  width:42px;height:42px;border-radius:16px;
  border:1px solid rgba(159,63,70,.12);
  background:rgba(255,250,244,.68);
  color:var(--red2);
  display:grid;place-items:center;
  font-weight:900;
  box-shadow:var(--soft);
}
.brandBlock{text-align:center;flex:1}
.brand{
  margin:0;
  font-size:40px;
  line-height:1;
  letter-spacing:-1px;
  font-weight:950;
}
.sub{
  color:var(--muted);
  font-weight:700;
  margin-top:8px;
  font-size:15px;
}
.card{
  background:rgba(255,250,244,.86);
  border:1px solid rgba(159,63,70,.12);
  border-radius:28px;
  padding:16px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
}
.nowCard{
  position:relative;
  overflow:hidden;
}
.nowCard:before{
  content:"";
  position:absolute;
  inset:-40px auto auto -45px;
  width:150px;height:150px;border-radius:50%;
  background:rgba(255,225,166,.55);
}
.nowBadge{
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:8px 12px;
  border-radius:999px;
  background:linear-gradient(135deg,var(--red),#db756c);
  color:white;
  font-weight:900;
  font-size:13px;
  box-shadow:0 7px 16px rgba(201,88,82,.22);
}
.nowContent{position:relative;z-index:1}
.nowGrid{
  display:grid;
  grid-template-columns:112px 1fr;
  gap:16px;
  align-items:center;
  margin-top:13px;
}
.cover{
  min-height:156px;
  border-radius:18px;
  background:
    radial-gradient(circle at 25% 20%,rgba(255,225,166,.7),transparent 28%),
    linear-gradient(150deg,#2b1415,#7d2e38 62%,#d07a67);
  color:#ffe2bf;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:12px;
  box-shadow:0 16px 26px rgba(43,20,21,.22);
  overflow:hidden;
  position:relative;
}
.cover:after{
  content:"♡";
  position:absolute;
  top:8px;left:10px;
  color:rgba(255,255,255,.55);
  font-size:24px;
}
.coverTitle{
  font-weight:950;
  font-size:18px;
  line-height:1.08;
}
.coverAuthor{font-size:12px;color:rgba(255,242,226,.78);margin-top:5px;font-weight:800}
.nowBookTitle{font-size:26px;font-weight:950;line-height:1.08;margin-bottom:5px}
.nowAuthor{color:var(--muted);font-weight:800}
.percentBig{
  font-size:50px;
  font-weight:950;
  color:var(--red);
  line-height:1;
  margin-top:12px;
}
.percentLbl{color:var(--muted);font-weight:800}
.progressBar{
  height:12px;
  background:#ecd3c7;
  border-radius:999px;
  overflow:hidden;
  margin-top:10px;
}
.progressFill{
  height:100%;
  width:0;
  background:linear-gradient(90deg,var(--wine),var(--red),#e49772);
  border-radius:999px;
}
.vibeRow{
  margin:12px 0 0;
  display:flex;
  align-items:center;
  gap:8px;
  background:rgba(255,255,255,.58);
  border:1px solid rgba(159,63,70,.10);
  border-radius:18px;
  padding:10px 12px;
  font-weight:900;
}
.vibeEmoji{font-size:28px}
.mainAction{
  width:100%;
  border:0;
  border-radius:22px;
  padding:17px 20px;
  margin-top:14px;
  color:white;
  background:linear-gradient(135deg,var(--red),var(--red2));
  font-weight:950;
  font-size:18px;
  box-shadow:0 15px 28px rgba(159,63,70,.24);
}
.secondaryAction{
  width:100%;
  border:1px solid rgba(159,63,70,.18);
  border-radius:20px;
  padding:14px 16px;
  margin-top:10px;
  color:var(--wine);
  background:rgba(255,250,244,.72);
  font-weight:900;
}
.sectionHead{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:22px 2px 10px;
}
.sectionTitle{font-size:18px;font-weight:950}
.textBtn{
  border:0;background:transparent;color:var(--red2);font-weight:900;padding:4px 0;
}
.momentList{display:grid;gap:8px}
.moment{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:9px;
  background:rgba(255,250,244,.74);
  border:1px solid rgba(159,63,70,.10);
  border-radius:18px;
  padding:10px 11px;
  box-shadow:var(--soft);
}
.momentType{
  width:36px;height:36px;border-radius:13px;
  display:grid;place-items:center;
  background:rgba(201,88,82,.12);
}
.momentMeta{color:var(--muted);font-size:12px;font-weight:900;margin-bottom:2px}
.momentText{font-weight:800;line-height:1.35}
.shelfRow{
  display:flex;gap:10px;overflow:auto;padding-bottom:7px;
}
.bookSmall{
  flex:0 0 100px;
  min-height:142px;
  border-radius:18px;
  background:linear-gradient(150deg,#321818,#80343f 60%,#d38167);
  color:#fff2e3;
  padding:10px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  box-shadow:0 12px 22px rgba(60,24,22,.18);
}
.bookSmallTitle{font-weight:950;line-height:1.08}
.bookSmallMeta{font-size:12px;color:rgba(255,242,226,.75);font-weight:800;margin-top:5px}
.empty{
  text-align:center;
  color:var(--muted);
  font-weight:800;
  padding:28px 16px;
}
.nav{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  bottom:14px;
  width:min(398px,calc(100% - 28px));
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  background:rgba(255,250,244,.86);
  border:1px solid rgba(159,63,70,.13);
  border-radius:25px;
  padding:8px;
  box-shadow:0 15px 40px rgba(76,34,28,.17);
  backdrop-filter:blur(10px);
  z-index:10;
}
.nav button{
  border:0;background:transparent;border-radius:18px;
  padding:9px 3px;color:#876156;font-weight:900;font-size:12px;
}
.nav button.on{background:rgba(201,88,82,.13);color:var(--red2)}
.pageHead{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.pageTitle{
  font-size:28px;font-weight:950;line-height:1.05;flex:1;
}
.fieldHero{
  background:linear-gradient(145deg,var(--red2),#b94f51);
  color:white;
  border-radius:0 0 30px 30px;
  margin:-18px -16px 16px;
  padding:18px 16px 20px;
  box-shadow:0 15px 35px rgba(117,45,63,.22);
}
.fieldHero .iconBtn{
  background:rgba(255,255,255,.14);
  color:white;
  border-color:rgba(255,255,255,.18);
  box-shadow:none;
}
.fieldTopRow{display:flex;align-items:center;gap:10px}
.fieldTitle{font-size:31px;font-weight:950;flex:1}
.fieldBook{
  margin-top:14px;
  background:rgba(255,250,244,.92);
  color:var(--ink);
  border-radius:22px;
  padding:12px;
  display:grid;
  grid-template-columns:1fr 70px;
  gap:12px;
  align-items:center;
}
.fieldBookName{font-weight:950;font-size:18px}
.fieldBookAuthor{color:var(--muted);font-weight:800;font-size:13px}
.fieldPercent{font-size:30px;font-weight:950;color:var(--red)}
.accordion{display:grid;gap:11px}
.accCard{
  background:rgba(255,250,244,.88);
  border:1px solid rgba(159,63,70,.12);
  border-radius:24px;
  box-shadow:var(--soft);
  overflow:hidden;
}
.accHead{
  width:100%;
  border:0;background:transparent;
  padding:15px 15px;
  display:flex;align-items:center;gap:10px;text-align:right;
}
.accIcon{
  width:38px;height:38px;border-radius:14px;
  display:grid;place-items:center;
  background:rgba(201,88,82,.12);
  color:var(--red2);
  font-size:20px;
}
.accTitle{font-weight:950;font-size:17px;flex:1}
.accChevron{color:var(--muted);font-weight:950}
.accBody{display:none;padding:0 15px 15px}
.accCard.open .accBody{display:block}
.input,.textarea{
  width:100%;
  border:1px solid rgba(159,63,70,.16);
  background:#fffdf9;
  border-radius:18px;
  padding:13px 14px;
  color:var(--ink);
  outline:none;
  font-weight:800;
}
.textarea{min-height:105px;resize:vertical;line-height:1.45}
.help{color:var(--muted);font-weight:800;font-size:13px;margin:7px 1px 10px}
.inline{
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  align-items:center;
}
.saveBtn,.pillBtn{
  border:0;border-radius:18px;
  background:linear-gradient(135deg,var(--red),var(--red2));
  color:white;
  font-weight:950;
  padding:12px 16px;
}
.pillBtn{
  border-radius:999px;
  padding:10px 14px;
  font-size:13px;
}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  border:1px solid rgba(159,63,70,.14);
  background:#fffdf9;
  color:var(--ink);
  border-radius:999px;
  padding:10px 13px;
  font-weight:900;
}
.chip.on{background:var(--red);color:white;border-color:var(--red)}
.charList{display:grid;gap:8px;margin-top:12px}
.charRow{
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  align-items:center;
  background:#fffdf9;
  border:1px solid rgba(159,63,70,.11);
  border-radius:17px;
  padding:10px 11px;
}
.charName{font-weight:950}
.charMeta{color:var(--muted);font-weight:800;font-size:12px}
.miniBtn{
  border:1px solid rgba(159,63,70,.16);
  background:rgba(255,250,244,.8);
  color:var(--red2);
  border-radius:13px;
  padding:8px 10px;
  font-weight:900;
}
.bottomMoments{
  margin-top:14px;
}
.summaryHero{
  background:linear-gradient(145deg,var(--red2),#b95255);
  color:white;
  border-radius:0 0 30px 30px;
  margin:-18px -16px 16px;
  padding:18px 16px 20px;
}
.summaryTitle{font-size:33px;font-weight:950;flex:1}
.stepCard{
  background:rgba(255,250,244,.9);
  border:1px solid rgba(159,63,70,.12);
  border-radius:25px;
  padding:15px;
  box-shadow:var(--soft);
  margin-bottom:11px;
}
.stepTitle{font-size:19px;font-weight:950;margin-bottom:10px}
.rateGroup{margin:10px 0 15px}
.rateLabel{font-weight:950;color:var(--wine);margin-bottom:8px}
.rateBtns{display:flex;gap:7px;flex-wrap:wrap}
.rateBtn{
  min-width:48px;
  border:1px solid rgba(159,63,70,.14);
  border-radius:15px;
  background:#fffdf9;
  padding:10px 11px;
  font-weight:950;
}
.rateBtn.on{background:var(--red);color:white;border-color:var(--red)}
.doneBtn{
  width:100%;
  border:0;
  margin-top:8px;
  border-radius:22px;
  padding:17px 20px;
  color:white;
  background:linear-gradient(135deg,var(--wine),var(--red2));
  font-size:20px;
  font-weight:950;
  box-shadow:0 15px 28px rgba(117,45,63,.24);
}
.tagSmall{
  display:inline-flex;
  border-radius:999px;
  padding:5px 9px;
  background:rgba(201,88,82,.12);
  color:var(--red2);
  font-size:12px;
  font-weight:900;
}
.toast{
  position:fixed;
  bottom:91px;
  left:50%;
  transform:translateX(-50%) translateY(10px);
  background:#2a1715;
  color:white;
  padding:11px 16px;
  border-radius:999px;
  font-weight:900;
  opacity:0;
  pointer-events:none;
  transition:.2s;
  z-index:30;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* v7 — סטטיסטיקה + הוספת דמות בתוך מסכמת */
.statsGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.statTile{
  background:rgba(255,250,244,.88);
  border:1px solid rgba(159,63,70,.12);
  border-radius:24px;
  padding:15px;
  box-shadow:var(--soft);
  min-height:112px;
}
.statNum{
  font-size:34px;
  font-weight:950;
  color:var(--red2);
  line-height:1;
}
.statLbl{
  color:var(--muted);
  font-weight:900;
  margin-top:7px;
}
.statHero{
  background:
    radial-gradient(circle at left top,rgba(255,225,166,.62),transparent 32%),
    linear-gradient(145deg,#fffaf4,#f3d1c4);
  border:1px solid rgba(159,63,70,.13);
  border-radius:30px;
  padding:18px;
  box-shadow:var(--shadow);
  margin-bottom:14px;
}
.statHeroTitle{
  font-size:30px;
  font-weight:950;
  line-height:1.05;
}
.statHeroSub{
  color:var(--muted);
  font-weight:850;
  margin-top:7px;
}
.summaryAddBox{
  margin-top:10px;
  padding:12px;
  border-radius:20px;
  background:#fffdf9;
  border:1px dashed rgba(159,63,70,.25);
}


/* v8 — פרטי ספר מלאים + מחיקה */
.detailHeroCard{
  background:linear-gradient(145deg,#fffaf4,#f1d1c2);
  border:1px solid rgba(159,63,70,.13);
  border-radius:30px;
  padding:16px;
  box-shadow:var(--shadow);
  margin-bottom:12px;
}
.detailGrid{
  display:grid;
  grid-template-columns:112px 1fr;
  gap:14px;
  align-items:center;
}
.detailActions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
  margin-top:12px;
}
.dangerBtn{
  border:1px solid rgba(159,63,70,.25);
  color:#8b2635;
  background:rgba(255,250,244,.82);
  border-radius:20px;
  padding:14px 16px;
  font-weight:950;
}
.fullSection{
  background:rgba(255,250,244,.9);
  border:1px solid rgba(159,63,70,.12);
  border-radius:24px;
  padding:15px;
  box-shadow:var(--soft);
  margin-bottom:11px;
}
.fullTitle{
  font-size:18px;
  font-weight:950;
  margin-bottom:10px;
  color:var(--wine);
}
.infoLine{
  display:grid;
  gap:5px;
  margin:10px 0;
}
.infoLbl{
  color:var(--muted);
  font-weight:900;
  font-size:13px;
}
.infoTxt{
  font-weight:850;
  line-height:1.45;
}
.deleteConfirm{
  position:fixed;
  inset:0;
  background:rgba(42,23,21,.38);
  display:none;
  place-items:end center;
  z-index:50;
  padding:16px;
}
.deleteConfirm.show{display:grid}
.confirmBox{
  width:min(430px,100%);
  background:#fffaf4;
  border:1px solid rgba(159,63,70,.16);
  border-radius:28px;
  padding:18px;
  box-shadow:0 25px 70px rgba(42,23,21,.30);
}
.confirmTitle{
  font-size:22px;
  font-weight:950;
}
.confirmText{
  color:var(--muted);
  font-weight:800;
  margin:7px 0 14px;
}


/* v9 — תיקוני אמת: סטטיסטיקה, דמויות, פרטי ספר ומחיקה */
.statsGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.statTile{
  background:rgba(255,250,244,.88);
  border:1px solid rgba(159,63,70,.12);
  border-radius:24px;
  padding:15px;
  box-shadow:var(--soft);
  min-height:112px;
}
.statNum{
  font-size:34px;
  font-weight:950;
  color:var(--red2);
  line-height:1;
}
.statLbl{
  color:var(--muted);
  font-weight:900;
  margin-top:7px;
}
.statHero{
  background:radial-gradient(circle at left top,rgba(255,225,166,.62),transparent 32%),linear-gradient(145deg,#fffaf4,#f3d1c4);
  border:1px solid rgba(159,63,70,.13);
  border-radius:30px;
  padding:18px;
  box-shadow:var(--shadow);
  margin-bottom:14px;
}
.statHeroTitle{
  font-size:30px;
  font-weight:950;
  line-height:1.05;
}
.statHeroSub{
  color:var(--muted);
  font-weight:850;
  margin-top:7px;
}


/* v11 — אייקונים סופיים + חיפוש יציב */
.ratingLine{
  display:inline-flex;
  align-items:center;
  flex-wrap:wrap;
  gap:7px;
}
.ratingStack{
  display:inline-flex;
  align-items:center;
  gap:3px;
}
.ratingSvg{
  width:18px;
  height:18px;
  display:inline-block;
  vertical-align:middle;
}
.ratingSvg svg{
  width:100%;
  height:100%;
  display:block;
}
.rateBtn .ratingStack{
  justify-content:center;
}
.rateBtn.on .ratingSvg svg *{
  fill:#fffaf4 !important;
  stroke:#fffaf4 !important;
}
.speedBox{
  display:grid;
  gap:10px;
}
.speedLabels{
  display:flex;
  justify-content:space-between;
  gap:5px;
  color:var(--muted);
  font-size:11px;
  font-weight:900;
}
.speedLabels span{
  max-width:58px;
  text-align:center;
}
.speedSlider{
  width:100%;
  accent-color:var(--red2);
}
.speedValue{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:9px 13px;
  border-radius:999px;
  background:rgba(201,88,82,.12);
  color:var(--red2);
  font-weight:950;
  width:max-content;
}
.shelfSearch{
  margin:3px 0 14px;
}
.searchEmpty{
  text-align:center;
  color:var(--muted);
  font-weight:850;
  padding:22px 12px;
}
.statNum .ratingSvg{
  width:16px;
  height:16px;
}


/* v12 — מיון וסינון במדף */
.shelfTools{
  display:grid;
  gap:9px;
  margin:3px 0 14px;
}
.toolRow{
  display:flex;
  gap:8px;
  align-items:center;
  overflow-x:auto;
  padding-bottom:2px;
}
.toolBtn{
  border:1px solid rgba(159,63,70,.16);
  background:rgba(255,250,244,.84);
  color:var(--red2);
  border-radius:999px;
  padding:10px 13px;
  font-weight:950;
  white-space:nowrap;
}
.toolBtn.on{
  background:var(--red);
  color:white;
  border-color:var(--red);
}
.activeFilters{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:-3px;
}
.filterTag{
  display:inline-flex;
  align-items:center;
  gap:5px;
  border-radius:999px;
  padding:6px 9px;
  background:rgba(201,88,82,.12);
  color:var(--red2);
  font-size:12px;
  font-weight:950;
}
.filterPanel{
  display:none;
  background:rgba(255,250,244,.9);
  border:1px solid rgba(159,63,70,.12);
  border-radius:24px;
  padding:13px;
  box-shadow:var(--soft);
}
.filterPanel.open{display:block}
.filterGroup{
  margin-bottom:13px;
}
.filterGroup:last-child{margin-bottom:0}
.filterTitle{
  color:var(--wine);
  font-weight:950;
  margin-bottom:8px;
}
.filterChips{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
}
.filterChip{
  border:1px solid rgba(159,63,70,.14);
  background:#fffdf9;
  color:var(--ink);
  border-radius:999px;
  padding:9px 12px;
  font-weight:900;
  font-size:13px;
}
.filterChip.on{

}
.sortPanel{

  background:rgba(255,250,244,.9);

.sortPanel.open{display:block}

</style>
</head>
<body>
<div class="app">
  <section id="home" class="screen active"></section>
  <section id="field" class="screen"></section>
  <section id="summary" class="screen"></section>
  <section id="shelf" class="screen"></section>
  <section id="stats" class="screen"></section>
</div>
<div class="nav">
  <button data-screen="home" class="on" onclick="show('home')">בית</button>
  <button onclick="goField()">עדכון</button>
  <button data-screen="shelf" onclick="show('shelf')">מדף</button>
  <button data-screen="stats" onclick="show('stats')">סטטיסטיקה</button>
</div>
<div id="deleteConfirm" class="deleteConfirm"></div>
<div id="toast" class="toast"></div>

<script>
const KEY='od-perek-ehad-v5';
const OLD_KEYS=['od-perek-ehad-v1'];
const MOODS=['נמרח','זורם','מתחיל לקרות משהו','מכורה','לא לדבר איתי','עצבנית עליו','הלב שלי לא בנוי לזה','וואו וואו וואו'];
const CHAR_TAGS=['אוהב/ת','חשוד/ה','מעצבן/ת','רוצה עוד ממנו/ממנה','דגל אדום','Book boyfriend / Book girlfriend','צריכ/ה טיפול','לא סגורה עליו/עליה'];
const FINAL_CHAR_TAGS=['נשאר/ה לי בראש','אהבתי','עצבן/ה אותי','דגל אדום','הייתי קוראת עליו/עליה ספר שלם','שכחתי ממנו/ממנה'];
const MOMENT_TAGS=['רגע וואו','רגע עצבים','רגע לב','רגע חשוב'];
const BOTTOM_LINES=['בלעתי','עדיין חושבת עליו','אהבתי אבל...','חמוד ותו לא','לא אמליץ'];
const SPEED=['נמרח','לקח זמן','זרם','מהר','בלעתי'];
let S=loadState();
let openAcc='percent';
let currentScreen='home';
let shelfSearch='';
let shelfSort='recent';
let shelfFilters={bottomLine:'',stars:0,heat:0,cry:0,speed:0,char:''};
let shelfFilterOpen=false;
let shelfSortOpen=false;

function loadState(){
  try{
    const cur=localStorage.getItem(KEY);
    if(cur) return normalize(JSON.parse(cur));
    for(const k of OLD_KEYS){
      const old=localStorage.getItem(k);
      if(old){
        const o=JSON.parse(old);
        return normalize({books:o.books||[],current:o.current||null});
      }
    }
  }catch(e){}
  return normalize({books:[],current:null});
}
function normalize(s){
  s.books=Array.isArray(s.books)?s.books:[];
  s.current=s.current||null;
  s.books=s.books.map(normalizeBook);
  if(s.current) s.current=normalizeCurrent(s.current);
  return s;
}
function normalizeBook(b){
  b.id=b.id||id();
  b.title=b.title||'';
  b.author=b.author||'';
  b.stars=+b.stars||0;
  b.heat=+b.heat||0;
  b.cry=+b.cry||0;
  b.speed=+b.speed||0;
  b.bottomLine=b.bottomLine||'';
  b.about=b.about||b.heroine||'';
  b.madeMe=b.madeMe||b.linger||'';
  b.characters=Array.isArray(b.characters)?b.characters:[];
  b.readingLog=Array.isArray(b.readingLog)?b.readingLog:(Array.isArray(b.updates)?b.updates:[]);
  b.createdAt=b.createdAt||new Date().toISOString();
  return b;
}
function normalizeCurrent(c){
  c.id=c.id||id();
  c.title=c.title||'';
  c.author=c.author||'';
  c.percent=pct(c.percent);
  c.lastMood=c.lastMood||'';
  c.updates=Array.isArray(c.updates)?c.updates:[];
  c.characters=Array.isArray(c.characters)?c.characters:[];
  c.startedAt=c.startedAt||new Date().toISOString();
  return c;
}
function save(){localStorage.setItem(KEY,JSON.stringify(S))}
function id(){return Date.now()+'-'+Math.random().toString(36).slice(2)}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function pct(n){return Math.max(0,Math.min(100,parseInt(n)||0))}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window.__toast);window.__toast=setTimeout(()=>t.classList.remove('show'),1400)}
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.screen===id));
  currentScreen=id;
  if(id==='home')renderHome();
  if(id==='field')renderField();
  if(id==='summary')renderSummary();
  if(id==='shelf')renderShelf();
  if(id==='stats')renderStats();
  scrollTo(0,0);
}
function topHtml(){
  return `<div class="top">
    <button class="iconBtn">☰</button>
    <div class="brandBlock"><h1 class="brand">עוד פרק אחד</h1><div class="sub">יומני התולעת</div></div>
    <button class="iconBtn">♡</button>
  </div>`;
}
function coverHtml(title,author){
  return `<div class="cover"><div class="coverTitle">${esc(title||'עוד פרק אחד')}</div><div class="coverAuthor">${esc(author||'')}</div></div>`;
}
function render(){
  renderHome();
  renderField();
  renderSummary();
  renderShelf();
  renderStats();
}
function renderHome(){
  const c=S.current;
  const recent=S.books.slice(0,8);
  document.getElementById('home').innerHTML=topHtml()+`
    ${c?currentHome(c):emptyHome()}
    <div class="sectionHead"><div class="sectionTitle">רגעים אחרונים מהשטח</div>${c?`<button class="textBtn" onclick="goField('timeline')">הצג הכל</button>`:''}</div>
    ${c&&c.updates.length?`<div class="momentList">${c.updates.slice(0,3).map(momentHtml).join('')}</div>`:`<div class="card empty">עוד אין עדכונים מהשטח. כשהדרמה תתחיל — היא תופיע פה.</div>`}
    <div class="sectionHead"><div class="sectionTitle">המדף שלי</div><button class="textBtn" onclick="show('shelf')">הכל</button></div>
    ${recent.length?`<div class="shelfRow">${recent.map(bookSmall).join('')}<button class="bookSmall" onclick="startNewBook()" style="background:#fffaf4;color:var(--red2);border:1px dashed rgba(159,63,70,.32)">+<br>הוסף ספר</button></div>`:`<div class="card empty">המדף מחכה לספר הראשון.</div>`}
  `;
}
function currentHome(c){
  return `<div class="card nowCard"><div class="nowContent">
    <span class="nowBadge">קוראת עכשיו</span>
    <div class="nowGrid">
      ${coverHtml(c.title,c.author)}
      <div>
        <div class="nowBookTitle">${esc(c.title)}</div>
        <div class="nowAuthor">${esc(c.author)}</div>
        <div class="percentBig">${pct(c.percent)}%</div>
        <div class="percentLbl">התקדמות בקריאה</div>
        <div class="progressBar"><div class="progressFill" style="width:${pct(c.percent)}%"></div></div>
      </div>
    </div>
    ${c.lastMood?`<div class="vibeRow"><span class="vibeEmoji">${moodEmoji(c.lastMood)}</span><span>${esc(c.lastMood)}</span><span style="margin-inline-start:auto;color:var(--muted)">מה הוייב?</span></div>`:''}
    <button class="mainAction" onclick="goField()">עדכון מהשטח ✎</button>
    <button class="secondaryAction" onclick="goSummary()">סיימתי</button>
  </div></div>`;
}
function emptyHome(){
  return `<div class="card nowCard"><div class="nowContent">
    <span class="nowBadge">קוראת עכשיו</span>
    <div class="empty">אין ספר פעיל כרגע.<br>בואי נכניס אחד לזירה.</div>
    <button class="mainAction" onclick="startNewBook()">להתחיל ספר</button>
  </div></div>`;
}
function moodEmoji(m){
  if(m.includes('מכורה'))return '😍';
  if(m.includes('עצבנית'))return '😤';
  if(m.includes('לב'))return '💔';
  if(m.includes('וואו'))return '🔥';
  if(m.includes('לא לדבר'))return '🤐';
  if(m.includes('נמרח'))return '🐌';
  return '💘';
}
function momentIcon(type){
  return {progress:'%',mood:'💘',note:'💬',quote:'❞',character:'👥'}[type]||'•';
}
function momentLabel(type){
  return {progress:'איפה אני',mood:'מה הוייב?',note:'מה בתכלס קורה',quote:'לגזור ולשמור',character:'על מי מדובר'}[type]||'עדכון';
}
function momentHtml(u){
  return `<div class="moment"><div class="momentType">${momentIcon(u.type)}</div><div><div class="momentMeta">${u.percent||0}% · ${momentLabel(u.type)}${u.finalTag?' · '+esc(u.finalTag):''}</div><div class="momentText">${esc(u.text||u.label||'')}</div></div></div>`;
}
function bookSmall(b){
  return `<div class="bookSmall" onclick="openBook('${b.id}')"><div class="bookSmallTitle">${esc(b.title)}</div><div class="bookSmallMeta">${esc(b.author)}<br>${ratingsLine(b)}</div></div>`;
}
function miniIcon(type){
  if(type==='heart'){
    return `<span class="ratingSvg"><svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#b64b54" d="M12 20.2s-7.3-4.5-9.4-9C1.1 8 .9 4.4 4.2 3.2c2.2-.8 4.1.3 5.3 1.9.7.9 1.1.9 1.8 0 1.2-1.6 3.1-2.7 5.3-1.9 3.3 1.2 3.1 4.8 1.6 8-2.1 4.5-9.4 9-9.4 9z"/></svg></span>`;
  }
  if(type==='pepper'){
    return `<span class="ratingSvg"><svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#b64b54" d="M13.7 6.2c3.7 1.1 6.2 4.7 5.2 8.4-.8 3.1-3.6 5.4-7.1 5.7-2.7.2-5.2-.7-6.7-2.4-1.4-1.6-1.6-3.7-.4-5.1.9-1.1 2.2-1.3 3.7-1.2.7.1 1.2-.2 1.4-.9.6-2.2 1.8-3.8 3.9-4.5z"/><path fill="#6f7b4e" d="M13.3 6.8c-.4-2.3.6-3.9 2.8-4.7.6-.2 1.1.4.8 1-.5.8-.8 1.5-.7 2.4 1-.6 2-.5 3 .2.6.4.4 1.3-.3 1.4-1.9.3-3.5.3-5.6-.3z"/></svg></span>`;
  }
  if(type==='broken'){
    return `<span class="ratingSvg"><svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#b64b54" d="M11.3 20.2s-6.9-4.3-8.8-8.7C1 8.1 1.1 4.7 4.2 3.3c2-.9 3.8 0 5 1.4l1.7 2.3-2 2.4 2.5 2.1-1.7 3.2 3.2-3.5-2.3-2 2-2.8c.9-1.9 3-4.2 6.1-3 3.1 1.2 3.2 4.8 1.7 8.1-1.9 4.4-8.8 8.7-8.8 8.7l-.3-.2z"/></svg></span>`;
  }
  return '';
}
function iconStack(type,n){
  n=+n||0;
  return `<span class="ratingStack">${Array.from({length:n},()=>miniIcon(type)).join('')}</span>`;
}
function ratingsLine(b){
  const a=[];
  if(b.stars)a.push(iconStack('heart',b.stars));
  if(b.heat)a.push(iconStack('pepper',b.heat));
  if(b.cry)a.push(iconStack('broken',b.cry));
  return a.length?`<span class="ratingLine">${a.join('')}</span>`:'';
}
function searchBookText(b){
  return [
    b.title,b.author,b.bottomLine,b.about,b.madeMe,
    (b.characters||[]).map(c=>[c.name,c.gender,c.tag,c.finalTag].join(' ')).join(' '),
    (b.readingLog||[]).map(u=>[u.text,u.label,u.finalTag].join(' ')).join(' ')
  ].join(' ').toLowerCase();
}

function startNewBook(){
  const title=prompt('שם הספר?');
  if(!title)return;
  const author=prompt('שם הסופרת?')||'';
  S.current=normalizeCurrent({title,author,percent:0,updates:[],characters:[]});
  save();show('home');toast('התחלנו לקרוא');
}
function goField(acc='percent'){
  if(!S.current){startNewBook();return}
  openAcc=acc;
  show('field');
}
function renderField(){
  const c=S.current;
  document.getElementById('field').innerHTML=c?`
    <div class="fieldHero">
      <div class="fieldTopRow"><button class="iconBtn" onclick="show('home')">→</button><div class="fieldTitle">עדכון מהשטח</div></div>
      <div class="fieldBook"><div><div class="fieldBookName">${esc(c.title)}</div><div class="fieldBookAuthor">${esc(c.author)}</div></div><div class="fieldPercent">${pct(c.percent)}%</div></div>
    </div>
    <div class="accordion">
      ${accCard('percent','📍','איפה אני',percentBody(c))}
      ${accCard('mood','♡','מה הוייב?',moodBody())}
      ${accCard('note','💬','מה בתכלס קורה',textBody('note','מה קרה עכשיו בספר? מי עצבן? מי ריגש? מה חייב להישמר?'))}
      ${accCard('quote','🔖','לגזור ולשמור',textBody('quote','משפט, ציטוט או רגע קטן שלא בא לך לשכוח'))}
      ${accCard('character','👥','על מי מדובר',charactersBody(c))}
    </div>
    <div class="bottomMoments">
      <div class="sectionHead"><div class="sectionTitle">ציר מהשטח</div></div>
      ${c.updates.length?`<div class="momentList">${c.updates.slice(0,6).map(momentHtml).join('')}</div>`:`<div class="card empty">עוד אין רגעים שמורים.</div>`}
    </div>
  `:``
}
function accCard(id,icon,title,body){
  return `<div class="accCard ${openAcc===id?'open':''}">
    <button class="accHead" onclick="toggleAcc('${id}')"><span class="accIcon">${icon}</span><span class="accTitle">${title}</span><span class="accChevron">${openAcc===id?'−':'+'}</span></button>
    <div class="accBody">${body}</div>
  </div>`;
}
function toggleAcc(id){openAcc=openAcc===id?'':id;renderField()}
function percentBody(c){
  return `<div class="help">אפשר רק לעדכן אחוז, ואפשר להוסיף מחשבה קצרה אם יש.</div>
  <div class="inline"><input id="percentInput" class="input" type="number" min="0" max="100" value="${pct(c.percent)}"><button class="saveBtn" onclick="savePercent()">שמירה</button></div>
  <textarea id="percentNote" class="textarea" placeholder="מחשבה קצרה? לא חובה"></textarea>`;
}
function moodBody(){
  return `<div class="chips">${MOODS.map(m=>`<button class="chip" onclick="saveMood('${jsEsc(m)}')">${esc(m)}</button>`).join('')}</div>`;
}
function textBody(type,ph){
  return `<textarea id="${type}Text" class="textarea" placeholder="${ph}"></textarea><div style="margin-top:9px"><button class="saveBtn" onclick="saveText('${type}')">שמרי לציר</button></div>`;
}
let pendingCharName='';
function charactersBody(c){
  const selectedM = pickedGender==='זכר'?'on':'';
  const selectedF = pickedGender==='נקבה'?'on':'';
  return `<input id="charName" class="input" placeholder="שם הדמות" value="${esc(pendingCharName)}" oninput="pendingCharName=this.value">
  <div class="help">זכר / נקבה</div>
  <div class="chips"><button class="chip ${selectedM}" onclick="pickGender('זכר')">זכר</button><button class="chip ${selectedF}" onclick="pickGender('נקבה')">נקבה</button></div>
  <div class="help">מה הסטטוס?</div>
  <div class="chips">${CHAR_TAGS.map(t=>`<button class="chip" onclick="saveCharacter('${jsEsc(t)}')">${esc(t)}</button>`).join('')}</div>
  <div class="help">אפשר להוסיף כמה דמויות ברצף. אחרי שמירה השדה מתנקה ונשארים כאן.</div>
  <div class="charList">${c.characters.length?c.characters.map(charHtml).join(''):'<div class="empty" style="padding:14px">עוד לא נוספו דמויות.</div>'}</div>`;
}
function charHtml(ch){
  return `<div class="charRow"><div><div class="charName">${esc(ch.name)}</div><div class="charMeta">${esc(ch.gender||'')} · ${esc(ch.tag||'')}</div></div><button class="miniBtn" onclick="deleteChar('${ch.id}')">מחקי</button></div>`;
}
let pickedGender='זכר';
function pickGender(g){
  const el=document.getElementById('charName');
  pendingCharName=el?el.value:pendingCharName;
  pickedGender=g;
  openAcc='character';
  renderField();
}

function jsEsc(s){return String(s||'').replaceAll('\\','\\\\').replaceAll("'","\\'").replaceAll('\n',' ')}
function addUpdate(type,label,text,extra={}){
  const c=S.current;if(!c)return;
  const u={id:id(),type,label,text,percent:pct(c.percent),ts:new Date().toISOString(),...extra};
  c.updates.unshift(u);
  if(type==='mood')c.lastMood=label;
  save();render();toast('נשמר לציר');
}
function savePercent(){
  const c=S.current;if(!c)return;
  const p=pct(document.getElementById('percentInput').value);
  const note=(document.getElementById('percentNote').value||'').trim();
  c.percent=p;
  addUpdate('progress','איפה אני',note||`הגעתי ל־${p}%`,{percent:p});
  openAcc='percent';renderField();
}
function saveMood(m){addUpdate('mood',m,m);openAcc='mood';renderField()}
function saveText(type){
  const el=document.getElementById(type+'Text');
  const text=(el?.value||'').trim();
  if(!text){toast('אין מה לשמור');return}
  addUpdate(type,type==='quote'?'לגזור ולשמור':'מה בתכלס קורה',text);
  openAcc=type;renderField();
}
function saveCharacter(tag){
  const c=S.current;if(!c)return;
  const el=document.getElementById('charName');
  const name=(el?.value||pendingCharName||'').trim();
  if(!name){toast('חסר שם דמות');return}
  const ch={id:id(),name,gender:pickedGender,tag,finalTag:'',ts:new Date().toISOString()};
  c.characters.push(ch);
  pendingCharName='';
  addUpdate('character','על מי מדובר',`${name} · ${pickedGender} · ${tag}`,{characterId:ch.id});
  openAcc='character';
  save();
  renderField();
  toast('הדמות נוספה');
}
function deleteChar(cid){
  if(!S.current)return;
  S.current.characters=S.current.characters.filter(c=>c.id!==cid);
  save();renderField();toast('נמחק');
}
function goSummary(){
  if(!S.current)return;
  if(!S.summaryDraft){
    S.summaryDraft={stars:0,heat:0,cry:0,speed:0,bottomLine:'',about:'',madeMe:'',momentTags:{},charFinal:{}};
  }
  show('summary');
}
function renderSummary(){
  const c=S.current,d=S.summaryDraft||{};
  document.getElementById('summary').innerHTML=c?`
    <div class="summaryHero">
      <div class="fieldTopRow"><button class="iconBtn" onclick="show('home')">→</button><div class="summaryTitle">מסכמת</div></div>
      <div style="margin-top:10px;font-weight:800">${esc(c.title)} · ${pct(c.percent)}%</div>
    </div>
    <div class="stepCard">
      <div class="stepTitle">דירוגים</div>
      ${rateGroup('stars','דירוג',5,'heart')}
      ${rateGroup('heat','כמה לוהט?',5,'pepper')}
      ${rateGroup('cry','כמה בכי?',5,'broken')}
      ${rateGroup('speed','כמה מהר?',5,'slider')}
    </div>
    <div class="stepCard">
      <div class="stepTitle">שורה תחתונה</div>
      <div class="chips">${BOTTOM_LINES.map(x=>`<button class="chip ${d.bottomLine===x?'on':''}" onclick="setDraft('bottomLine','${jsEsc(x)}')">${esc(x)}</button>`).join('')}</div>
    </div>
    <div class="stepCard">
      <div class="stepTitle">בשורה אחת</div>
      <div class="help">זה היה ספר על…</div>
      <textarea id="aboutText" class="textarea" placeholder="מה הסיפור בגדול?" oninput="setDraft('about',this.value,false)">${esc(d.about||'')}</textarea>
      <div class="help">והוא גרם לי…</div>
      <textarea id="madeMeText" class="textarea" placeholder="מה זה עשה לך?" oninput="setDraft('madeMe',this.value,false)">${esc(d.madeMe||'')}</textarea>
    </div>
    <div class="stepCard">
      <div class="stepTitle">מה נסגר עם הדמויות?</div>
      ${c.characters.length?c.characters.map(summaryChar).join(''):`<div class="empty" style="padding:14px">לא נוספו דמויות בזמן הקריאה.</div>`}
      ${summaryAddCharacterBox()}
    </div>
    <div class="stepCard">
      <div class="stepTitle">רגעים מהשטח</div>
      ${c.updates.length?c.updates.map(summaryMoment).join(''):`<div class="empty">אין רגעים לסמן.</div>`}
    </div>
    <button class="doneBtn" onclick="finishBook()">וזהו</button>
  `:'';
}
function rateGroup(key,label,max,type){
  const d=S.summaryDraft||{};
  if(key==='speed'){
    const val=d.speed||3;
    return `<div class="rateGroup">
      <div class="rateLabel">כמה מהר?</div>
      <div class="speedBox">
        <input class="speedSlider" type="range" min="1" max="5" step="1" value="${val}" oninput="setDraft('speed',+this.value)">
        <div class="speedLabels">${SPEED.map(x=>`<span>${x}</span>`).join('')}</div>
        <div class="speedValue">${SPEED[val-1]}</div>
      </div>
    </div>`;
  }
  const iconType = key==='stars'?'heart':key==='heat'?'pepper':'broken';
  const finalLabel = key==='stars'?'דירוג':key==='heat'?'כמה לוהט?':'כמה בכי?';
  return `<div class="rateGroup"><div class="rateLabel">${finalLabel}</div><div class="rateBtns">${[1,2,3,4,5].map(n=>`<button class="rateBtn ${d[key]===n?'on':''}" onclick="setDraft('${key}',${n})">${iconStack(iconType,n)}</button>`).join('')}</div></div>`;
}

function setDraft(k,v,rer=true){
  S.summaryDraft=S.summaryDraft||{};
  S.summaryDraft[k]=v;
  save();
  if(rer)renderSummary();
}
function summaryChar(ch){
  const d=S.summaryDraft||{}; const val=(d.charFinal||{})[ch.id]||ch.finalTag||'';
  return `<div class="charRow" style="display:block"><div class="charName">${esc(ch.name)} <span class="charMeta">${esc(ch.gender||'')} · ${esc(ch.tag||'')}</span></div>
    <div class="chips" style="margin-top:8px">${FINAL_CHAR_TAGS.map(t=>`<button class="chip ${val===t?'on':''}" onclick="setCharFinal('${ch.id}','${jsEsc(t)}')">${esc(t)}</button>`).join('')}</div>
  </div>`;
}
function setCharFinal(cid,tag){
  S.summaryDraft=S.summaryDraft||{};S.summaryDraft.charFinal=S.summaryDraft.charFinal||{};
  S.summaryDraft.charFinal[cid]=tag;save();renderSummary();
}
function summaryMoment(u){
  const d=S.summaryDraft||{};const val=(d.momentTags||{})[u.id]||u.finalTag||'';
  return `<div class="moment" style="display:block"><div class="momentMeta">${u.percent||0}% · ${momentLabel(u.type)}</div><div class="momentText">${esc(u.text||'')}</div>
    <div class="chips" style="margin-top:8px">${MOMENT_TAGS.map(t=>`<button class="chip ${val===t?'on':''}" onclick="setMomentTag('${u.id}','${jsEsc(t)}')">${esc(t)}</button>`).join('')}</div>
  </div>`;
}
function setMomentTag(mid,tag){
  S.summaryDraft=S.summaryDraft||{};S.summaryDraft.momentTags=S.summaryDraft.momentTags||{};
  S.summaryDraft.momentTags[mid]=tag;save();renderSummary();
}

function summaryAddCharacterBox(){
  return `<div class="summaryAddBox">
    <div class="stepTitle" style="font-size:16px;margin-bottom:8px">+ להוסיף דמות לסיכום</div>
    <input id="sumCharName" class="input" placeholder="שם הדמות">
    <div class="help">זכר / נקבה</div>
    <div class="chips"><button class="chip" onclick="pickSummaryGender('זכר')">זכר</button><button class="chip" onclick="pickSummaryGender('נקבה')">נקבה</button></div>
    <div class="help">סיכום סופי</div>
    <div class="chips">${FINAL_CHAR_TAGS.map(t=>`<button class="chip" onclick="addSummaryCharacter('${jsEsc(t)}')">${esc(t)}</button>`).join('')}</div>
  </div>`;
}
let summaryGender='זכר';
function pickSummaryGender(g){summaryGender=g;toast(g)}
function addSummaryCharacter(finalTag){
  const c=S.current;if(!c)return;
  const name=(document.getElementById('sumCharName')?.value||'').trim();
  if(!name){toast('חסר שם דמות');return}
  const ch={id:id(),name,gender:summaryGender,tag:'נוספה בסיכום',finalTag,ts:new Date().toISOString()};
  c.characters.push(ch);
  S.summaryDraft=S.summaryDraft||{};
  S.summaryDraft.charFinal=S.summaryDraft.charFinal||{};
  S.summaryDraft.charFinal[ch.id]=finalTag;
  save();renderSummary();toast('הדמות נוספה לסיכום');
}

function finishBook(){
  const c=S.current;if(!c)return;
  const d=S.summaryDraft||{};
  const chars=c.characters.map(ch=>({...ch,finalTag:(d.charFinal||{})[ch.id]||ch.finalTag||''}));
  const log=c.updates.map(u=>({...u,finalTag:(d.momentTags||{})[u.id]||u.finalTag||''}));
  const b=normalizeBook({
    id:c.id,title:c.title,author:c.author,createdAt:new Date().toISOString(),
    stars:d.stars||0,heat:d.heat||0,cry:d.cry||0,speed:d.speed||0,
    bottomLine:d.bottomLine||'',about:d.about||'',madeMe:d.madeMe||'',
    characters:chars,readingLog:log,percent:c.percent
  });
  S.books.unshift(b);S.current=null;S.summaryDraft=null;save();show('home');toast('נכנס למדף');
}
function renderShelf(){
  document.getElementById('shelf').innerHTML=topHtml()+`
    <div class="sectionHead"><div class="sectionTitle">המדף שלי</div><button class="pillBtn" onclick="startNewBook()">ספר חדש</button></div>
    <div class="shelfTools">
      <input id="shelfSearchInput" class="input" placeholder="חיפוש לפי ספר, סופרת, דמות או רגע מהשטח" value="${esc(shelfSearch)}" oninput="updateShelfSearch(this.value)">
      <div class="toolRow">
        <button class="toolBtn ${shelfSortOpen?'on':''}" onclick="toggleShelfSort()">מיון: ${sortLabel(shelfSort)}</button>
        <button class="toolBtn ${shelfFilterOpen?'on':''}" onclick="toggleShelfFilters()">סינון</button>
        <button class="toolBtn" onclick="resetShelfTools()">איפוס</button>
      </div>
      ${activeShelfFiltersHtml()}
      <div id="sortPanel" class="sortPanel ${shelfSortOpen?'open':''}">${sortPanelHtml()}</div>
      <div id="filterPanel" class="filterPanel ${shelfFilterOpen?'open':''}">${filterPanelHtml()}</div>
    </div>
    <div id="shelfResults">${shelfResultsHtml()}</div>
  `;
}
function updateShelfSearch(q){
  shelfSearch=q;
  updateShelfResultsOnly();
}
function updateShelfResultsOnly(){
  const el=document.getElementById('shelfResults');
  if(el) el.innerHTML=shelfResultsHtml();
}
function toggleShelfSort(){
  shelfSortOpen=!shelfSortOpen;
  shelfFilterOpen=false;
  renderShelf();
}
function toggleShelfFilters(){
  shelfFilterOpen=!shelfFilterOpen;
  shelfSortOpen=false;
  renderShelf();
}
function sortLabel(k){
  return {
    recent:'הכי חדש',
    love:'הכי אהבתי',
    heat:'הכי לוהט',
    cry:'הכי שבר אותי',
    fast:'בלעתי הכי מהר',
    slow:'הכי נמרח',
    title:'א׳-ת׳ ספר',
    author:'א׳-ת׳ סופרת'
  }[k]||'הכי חדש';
}
function setShelfSort(k){
  shelfSort=k;
  shelfSortOpen=false;
  renderShelf();
}
function sortPanelHtml(){
  const opts=['recent','love','heat','cry','fast','slow','title','author'];
  return `<div class="filterGroup"><div class="filterTitle">איך למיין?</div><div class="filterChips">${opts.map(k=>`<button class="filterChip ${shelfSort===k?'on':''}" onclick="setShelfSort('${k}')">${sortLabel(k)}</button>`).join('')}</div></div>`;
}
function filterPanelHtml(){
  return `
    <div class="filterGroup">
      <div class="filterTitle">שורה תחתונה</div>
      <div class="filterChips">${BOTTOM_LINES.map(x=>filterChip('bottomLine',x,x)).join('')}</div>
    </div>
    <div class="filterGroup">
      <div class="filterTitle">דירוג</div>
      <div class="filterChips">${[1,2,3,4,5].map(n=>filterChip('stars',n,`${n} לבבות`)).join('')}</div>
    </div>
    <div class="filterGroup">
      <div class="filterTitle">כמה לוהט</div>
      <div class="filterChips">${[1,2,3,4,5].map(n=>filterChip('heat',n,`${n} פלפלים`)).join('')}</div>
    </div>
    <div class="filterGroup">
      <div class="filterTitle">כמה בכי</div>
      <div class="filterChips">${[1,2,3,4,5].map(n=>filterChip('cry',n,`${n} לב שבור`)).join('')}</div>
    </div>
    <div class="filterGroup">
      <div class="filterTitle">קצב קריאה</div>
      <div class="filterChips">${SPEED.map((x,i)=>filterChip('speed',i+1,x)).join('')}</div>
    </div>
    <div class="filterGroup">
      <div class="filterTitle">דמויות</div>
      <div class="filterChips">
        ${filterChip('char','redflag','יש דגל אדום')}
        ${filterChip('char','bookbf','Book boyfriend/girlfriend')}
        ${filterChip('char','stuck','נשאר/ה לי בראש')}
      </div>
    </div>
  `;
}
function filterChip(key,val,label){
  const on=shelfFilters[key]===val;
  return `<button class="filterChip ${on?'on':''}" onclick="toggleShelfFilter('${key}','${jsEsc(String(val))}')">${esc(label)}</button>`;
}
function toggleShelfFilter(key,val){
  if(['stars','heat','cry','speed'].includes(key)) val=Number(val);
  shelfFilters[key]=shelfFilters[key]===val? (['stars','heat','cry','speed'].includes(key)?0:'') : val;
  renderShelf();
}
function resetShelfTools(){
  shelfSearch='';
  shelfSort='recent';
  shelfFilters={bottomLine:'',stars:0,heat:0,cry:0,speed:0,char:''};
  shelfFilterOpen=false;
  shelfSortOpen=false;
  renderShelf();
}
function activeShelfFiltersHtml(){
  const tags=[];
  if(shelfSearch.trim()) tags.push(`חיפוש: ${shelfSearch.trim()}`);
  if(shelfSort!=='recent') tags.push(`מיון: ${sortLabel(shelfSort)}`);
  if(shelfFilters.bottomLine) tags.push(shelfFilters.bottomLine);
  if(shelfFilters.stars) tags.push(`${shelfFilters.stars} לבבות`);
  if(shelfFilters.heat) tags.push(`${shelfFilters.heat} פלפלים`);
  if(shelfFilters.cry) tags.push(`${shelfFilters.cry} לב שבור`);
  if(shelfFilters.speed) tags.push(SPEED[shelfFilters.speed-1]);
  if(shelfFilters.char==='redflag') tags.push('יש דגל אדום');
  if(shelfFilters.char==='bookbf') tags.push('Book boyfriend/girlfriend');
  if(shelfFilters.char==='stuck') tags.push('נשאר/ה לי בראש');
  return tags.length?`<div class="activeFilters">${tags.map(t=>`<span class="filterTag">${esc(t)}</span>`).join('')}</div>`:'';
}
function matchesShelfFilters(b){
  const f=shelfFilters;
  if(f.bottomLine && b.bottomLine!==f.bottomLine) return false;
  if(f.stars && (+b.stars||0)!==f.stars) return false;
  if(f.heat && (+b.heat||0)!==f.heat) return false;
  if(f.cry && (+b.cry||0)!==f.cry) return false;
  if(f.speed && (+b.speed||0)!==f.speed) return false;
  if(f.char){
    const chars=b.characters||[];
    if(f.char==='redflag' && !chars.some(c=>String(c.tag||'').includes('דגל אדום')||String(c.finalTag||'').includes('דגל אדום'))) return false;
    if(f.char==='bookbf' && !chars.some(c=>String(c.tag||'').toLowerCase().includes('book boyfriend')||String(c.tag||'').toLowerCase().includes('book girlfriend'))) return false;
    if(f.char==='stuck' && !chars.some(c=>String(c.finalTag||'').includes('נשאר'))) return false;
  }
  return true;
}
function sortShelfBooks(arr){
  return [...arr].sort((a,b)=>{
    if(shelfSort==='recent') return new Date(b.createdAt||0)-new Date(a.createdAt||0);
    if(shelfSort==='love') return (+b.stars||0)-(+a.stars||0);
    if(shelfSort==='heat') return (+b.heat||0)-(+a.heat||0);
    if(shelfSort==='cry') return (+b.cry||0)-(+a.cry||0);
    if(shelfSort==='fast') return (+b.speed||0)-(+a.speed||0);
    if(shelfSort==='slow') return (+a.speed||9)-(+b.speed||9);
    if(shelfSort==='title') return String(a.title||'').localeCompare(String(b.title||''),'he');
    if(shelfSort==='author') return String(a.author||'').localeCompare(String(b.author||''),'he');
    return 0;
  });
}
function shelfResultsHtml(){
  const q=(shelfSearch||'').trim().toLowerCase();
  let books=S.books.filter(b=>!q || searchBookText(b).includes(q));
  books=books.filter(matchesShelfFilters);
  books=sortShelfBooks(books);
  if(!S.books.length) return `<div class="card empty">עוד אין ספרים שסיימת.</div>`;
  if(!books.length) return `<div class="card searchEmpty">לא מצאתי כלום במדף. המדף דרמטי אבל לא עד כדי כך.</div>`;
  return `<div class="momentList">${books.map(bookRow).join('')}</div>`;
}

function bookRow(b){
  return `<div class="card" onclick="openBook('${b.id}')" style="box-shadow:var(--soft);margin-bottom:10px">
    <div style="display:grid;grid-template-columns:74px 1fr;gap:12px;align-items:center">
      ${coverHtml(b.title,b.author)}
      <div><div class="nowBookTitle" style="font-size:21px">${esc(b.title)}</div><div class="nowAuthor">${esc(b.author)}</div><div style="margin-top:7px">${ratingsLine(b)} ${b.bottomLine?`<span class="tagSmall">${esc(b.bottomLine)}</span>`:''}</div></div>
    </div>
  </div>`;
}

function openBook(bookId){
  const b=S.books.find(x=>x.id===bookId);if(!b)return;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('shelf').classList.add('active');
  document.querySelectorAll('.nav button').forEach(btn=>btn.classList.toggle('on',btn.dataset.screen==='shelf'));
  currentScreen='bookDetail';
  document.getElementById('shelf').innerHTML=`
    <div class="pageHead"><button class="iconBtn" onclick="show('shelf')">→</button><div class="pageTitle">${esc(b.title)}</div></div>

    <div class="detailHeroCard">
      <div class="detailGrid">
        ${coverHtml(b.title,b.author)}
        <div>
          <div class="nowBookTitle">${esc(b.title)}</div>
          <div class="nowAuthor">${esc(b.author)}</div>
          <div style="margin-top:8px">${ratingsLine(b)}</div>
          ${b.bottomLine?`<div class="vibeRow">${esc(b.bottomLine)}</div>`:''}
        </div>
      </div>
      <div class="detailActions">
        <button class="secondaryAction" onclick="show('shelf')" style="margin-top:0">חזרה למדף</button>
        <button class="dangerBtn" onclick="confirmDeleteBook('${b.id}')">הסרת ספר</button>
      </div>
    </div>

    <div class="fullSection">
      <div class="fullTitle">הסיכום שלי</div>
      ${b.bottomLine?`<div class="infoLine"><div class="infoLbl">שורה תחתונה</div><div class="infoTxt">${esc(b.bottomLine)}</div></div>`:''}
      ${b.about?`<div class="infoLine"><div class="infoLbl">זה היה ספר על…</div><div class="infoTxt">${esc(b.about)}</div></div>`:''}
      ${b.madeMe?`<div class="infoLine"><div class="infoLbl">והוא גרם לי…</div><div class="infoTxt">${esc(b.madeMe)}</div></div>`:''}
      ${(!b.bottomLine&&!b.about&&!b.madeMe)?`<div class="empty" style="padding:12px">אין עדיין סיכום טקסטואלי לספר הזה.</div>`:''}
    </div>

    <div class="fullSection">
      <div class="fullTitle">דירוגים</div>
      <div class="statsGrid">
        <div class="statTile"><div class="statNum">${b.stars?iconStack('heart',b.stars):'—'}</div><div class="statLbl">דירוג</div></div>
        <div class="statTile"><div class="statNum">${b.heat?iconStack('pepper',b.heat):'—'}</div><div class="statLbl">לוהט</div></div>
        <div class="statTile"><div class="statNum">${b.cry?iconStack('broken',b.cry):'—'}</div><div class="statLbl">בכי</div></div>
        <div class="statTile"><div class="statNum">${b.speed?SPEED[b.speed-1]:'—'}</div><div class="statLbl">קצב</div></div>
      </div>
    </div>

    ${b.characters?.length?`<div class="fullSection">
      <div class="fullTitle">מה נסגר עם הדמויות?</div>
      <div class="momentList">
        ${b.characters.map(ch=>`<div class="charRow"><div><div class="charName">${esc(ch.name)}</div><div class="charMeta">${esc(ch.gender||'')} · ${esc(ch.tag||'')}${ch.finalTag?' · '+esc(ch.finalTag):''}</div></div></div>`).join('')}
      </div>
    </div>`:''}

    ${b.readingLog?.filter(u=>u.finalTag).length?`<div class="fullSection">
      <div class="fullTitle">רגעים נבחרים מהשטח</div>
      <div class="momentList">${b.readingLog.filter(u=>u.finalTag).map(momentHtml).join('')}</div>
    </div>`:''}

    ${b.readingLog?.length?`<div class="fullSection">
      <div class="fullTitle">ציר מלא מהשטח</div>
      <div class="momentList">${b.readingLog.map(momentHtml).join('')}</div>
    </div>`:''}
  `;
  scrollTo(0,0);
}
function confirmDeleteBook(bookId){
  const b=S.books.find(x=>x.id===bookId); if(!b)return;
  const box=document.getElementById('deleteConfirm');
  box.innerHTML=`<div class="confirmBox">
    <div class="confirmTitle">להסיר את הספר מהמדף?</div>
    <div class="confirmText">${esc(b.title)} יימחק מהמדף ומהסטטיסטיקה.</div>
    <div class="detailActions">
      <button class="dangerBtn" onclick="deleteBook('${b.id}')">כן, להסיר</button>
      <button class="secondaryAction" onclick="hideDeleteConfirm()" style="margin-top:0">ביטול</button>
    </div>
  </div>`;
  box.classList.add('show');
}
function hideDeleteConfirm(){
  document.getElementById('deleteConfirm').classList.remove('show');
}
function deleteBook(bookId){
  S.books=S.books.filter(b=>b.id!==bookId);
  save();
  hideDeleteConfirm();
  show('shelf');
  toast('הספר הוסר מהמדף');
}


function renderStats(){
  const el=document.getElementById('stats');
  if(!el)return;
  const books=Array.isArray(S.books)?S.books:[];
  const total=books.length;
  const avg=(key)=>{
    const vals=books.map(b=>+b[key]||0).filter(v=>v>0);
    return vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):'—';
  };
  const maxBook=(key,min=false)=>{
    const vals=books.filter(b=>(+b[key]||0)>0);
    if(!vals.length)return null;
    return vals.sort((a,b)=>min?(+a[key]||0)-(+b[key]||0):(+b[key]||0)-(+a[key]||0))[0];
  };
  const topLine=()=>{
    if(!total)return 'המדף עוד מתחמם. תני לו ספר אחד והוא יתחיל לדבר.';
    if((parseFloat(avg('heat'))||0)>=4)return 'השנה המדף שלך בחר דרמה, אש, ואפס התנצלות.';
    if((parseFloat(avg('cry'))||0)>=4)return 'הרבה לב, הרבה דמעות, מעט מאוד שינה.';
    return 'יש פה מדף עם אופי. וזה רק הולך ומסתבך.';
  };
  const heat=maxBook('heat'),cry=maxBook('cry'),stars=maxBook('stars'),fast=maxBook('speed'),slow=maxBook('speed',true);
  el.innerHTML=topHtml()+`
    <div class="statHero">
      <div class="statHeroTitle">המצב במדף</div>
      <div class="statHeroSub">${topLine()}</div>
    </div>
    <div class="statsGrid">
      <div class="statTile"><div class="statNum">${total}</div><div class="statLbl">ספרים שסיימת</div></div>
      <div class="statTile"><div class="statNum">${avg('stars')}</div><div class="statLbl">ממוצע כוכבים</div></div>
      <div class="statTile"><div class="statNum">${avg('heat')}</div><div class="statLbl">ממוצע חריפות</div></div>
      <div class="statTile"><div class="statNum">${avg('cry')}</div><div class="statLbl">ממוצע בכי</div></div>
    </div>
    <div class="sectionHead"><div class="sectionTitle">הזוכות של המדף</div></div>
    <div class="momentList">
      ${statLeader('הכי אהבתי',stars)}
      ${statLeader('הכי לוהט',heat)}
      ${statLeader('הכי בכי',cry)}
      ${statLeader('בלעתי הכי מהר',fast)}
      ${statLeader('הכי נמרח',slow)}
    </div>
  `;
}
function statLeader(label,b){
  return `<div class="moment"><div class="momentType">♡</div><div><div class="momentMeta">${label}</div><div class="momentText">${b?esc(b.title):'—'}</div></div></div>`;
}

render();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
</body>
</html>
