<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">

<style>
:root{
  --bg:#fff4eb;
  --cream:#fffaf4;
  --cream2:#f8e4d6;
  --ink:#2a1715;
  --muted:#8b655a;
  --line:#ead1c4;
  --red:#c95852;
  --red2:#9f3f46;
  --wine:#762d3f;
  --rose:#e4aaa0;
  --sand:#ffe1a6;
  --shadow:0 18px 45px rgba(76,34,28,.14);

}
*{box-sizing:border-box;font-style:normal}
body{
  margin:0;
  min-height:100dvh;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;

}
button,input,textarea{font:inherit}
button{cursor:pointer}
.app{
  max-width:430px;
  margin:0 auto;
  min-height:100dvh;

}
.screen{display:none}
.screen.active{display:block}
.top{

}

}

.brand{

}
.sub{

}
.card{

.nowCard{
  position:relative;

}
.nowCard:before{

<body>
<div class="app">
  <section id="home" class="screen active"></section>
  <section id="field" class="screen"></section>
  <section id="summary" class="screen"></section>
  <section id="shelf" class="screen"></section>
  <section id="stats" class="screen"></section>
</div>
<div class="nav">
  <button data-screen="home" class="on" onclick="show('home')">בית</button>
  <button onclick="goField()">עדכון</button>
  <button data-screen="shelf" onclick="show('shelf')">מדף</button>
  <button data-screen="stats" onclick="show('stats')">סטטיסטיקה</button>
</div>
<div id="deleteConfirm" class="deleteConfirm"></div>
<div id="toast" class="toast"></div>

<script>
const KEY='od-perek-ehad-v5';
const OLD_KEYS=['od-perek-ehad-v1'];
const MOODS=['נמרח','זורם','מתחיל לקרות משהו','מכורה','לא לדבר איתי','עצבנית עליו','הלב שלי לא בנוי לזה','וואו וואו וואו'];
const CHAR_TAGS=['אוהב/ת','חשוד/ה','מעצבן/ת','רוצה עוד ממנו/ממנה','דגל אדום','Book boyfriend / Book girlfriend','צריכ/ה טיפול','לא סגורה עליו/עליה'];
const FINAL_CHAR_TAGS=['נשאר/ה לי בראש','אהבתי','עצבן/ה אותי','דגל אדום','הייתי קוראת עליו/עליה ספר שלם','שכחתי ממנו/ממנה'];
const MOMENT_TAGS=['רגע וואו','רגע עצבים','רגע לב','רגע חשוב'];
const BOTTOM_LINES=['בלעתי','עדיין חושבת עליו','אהבתי אבל...','חמוד ותו לא','לא אמליץ'];
const SPEED=['🐢','🐌','🐇','⚡','🚀'];
let S=loadState();
let openAcc='percent';

function loadState(){
  try{
    const cur=localStorage.getItem(KEY);
    if(cur) return normalize(JSON.parse(cur));
    for(const k of OLD_KEYS){
      const old=localStorage.getItem(k);
      if(old){
        const o=JSON.parse(old);
        return normalize({books:o.books||[],current:o.current||null});
      }
    }
  }catch(e){}
  return normalize({books:[],current:null});
}
function normalize(s){
  s.books=Array.isArray(s.books)?s.books:[];
  s.current=s.current||null;
  s.books=s.books.map(normalizeBook);
  if(s.current) s.current=normalizeCurrent(s.current);
  return s;
}
function normalizeBook(b){
  b.id=b.id||id();
  b.title=b.title||'';
  b.author=b.author||'';
  b.stars=+b.stars||0;
  b.heat=+b.heat||0;
  b.cry=+b.cry||0;
  b.speed=+b.speed||0;
  b.bottomLine=b.bottomLine||'';
  b.about=b.about||b.heroine||'';
  b.madeMe=b.madeMe||b.linger||'';
  b.characters=Array.isArray(b.characters)?b.characters:[];
  b.readingLog=Array.isArray(b.readingLog)?b.readingLog:(Array.isArray(b.updates)?b.updates:[]);
  b.createdAt=b.createdAt||new Date().toISOString();
  return b;
}
function normalizeCurrent(c){
  c.id=c.id||id();
  c.title=c.title||'';
  c.author=c.author||'';
  c.percent=pct(c.percent);
  c.lastMood=c.lastMood||'';
  c.updates=Array.isArray(c.updates)?c.updates:[];
  c.characters=Array.isArray(c.characters)?c.characters:[];
  c.startedAt=c.startedAt||new Date().toISOString();
  return c;
}
function save(){localStorage.setItem(KEY,JSON.stringify(S))}
function id(){return Date.now()+'-'+Math.random().toString(36).slice(2)}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function pct(n){return Math.max(0,Math.min(100,parseInt(n)||0))}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window.__toast);window.__toast=setTimeout(()=>t.classList.remove('show'),1400)}
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.screen===id));

function moodEmoji(m){
  if(m.includes('מכורה'))return '😍';
  if(m.includes('עצבנית'))return '😤';
  if(m.includes('לב'))return '💔';
  if(m.includes('וואו'))return '🔥';
  if(m.includes('לא לדבר'))return '🤐';
  if(m.includes('נמרח'))return '🐌';

}
function confirmDeleteBook(bookId){
  const b=S.books.find(x=>x.id===bookId); if(!b)return;
  const box=document.getElementById('deleteConfirm');
  box.innerHTML=`<div class="confirmBox">
    <div class="confirmTitle">להסיר את הספר מהמדף?</div>
    <div class="confirmText">${esc(b.title)} יימחק מהמדף ומהסטטיסטיקה.</div>
    <div class="detailActions">
      <button class="dangerBtn" onclick="deleteBook('${b.id}')">כן, להסיר</button>
      <button class="secondaryAction" onclick="hideDeleteConfirm()" style="margin-top:0">ביטול</button>
    </div>
  </div>`;
  box.classList.add('show');
}
function hideDeleteConfirm(){
  document.getElementById('deleteConfirm').classList.remove('show');
}
function deleteBook(bookId){
  S.books=S.books.filter(b=>b.id!==bookId);
  save();
  hideDeleteConfirm();
  renderShelf();
  renderStats();
  show('shelf');
  toast('הספר הוסר מהמדף');
}

render();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
</body>
</html>
