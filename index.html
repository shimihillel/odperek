<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#070b19">
<title>עוד פרק אחד v41</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
:root{
  --bg:#fff4eb;
  --cream:#fffaf4;
  --cream2:#f8e4d6;
  --ink:#2a1715;
  --muted:#8b655a;
  --line:#ead1c4;
  --red:#c95852;
  --red2:#9f3f46;
  --wine:#762d3f;
  --rose:#e4aaa0;
  --sand:#ffe1a6;
  --shadow:0 18px 45px rgba(76,34,28,.14);
  --soft:0 9px 22px rgba(76,34,28,.08);
}
*{box-sizing:border-box;font-style:normal}
body{
  margin:0;
  min-height:100dvh;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 12% 6%,rgba(255,225,166,.62),transparent 24%),
    radial-gradient(circle at 88% 5%,rgba(159,63,70,.19),transparent 26%),
    radial-gradient(circle at 75% 92%,rgba(201,88,82,.18),transparent 28%),
    linear-gradient(145deg,#fffaf4 0%,#f2d7c8 100%);
}
button,input,textarea{font:inherit}
button{cursor:pointer}
.app{
  max-width:430px;
  margin:0 auto;
  min-height:100dvh;
  padding:18px 16px 92px;
  position:relative;
}
.screen{display:none}
.screen.active{display:block}
.top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:4px 0 18px;
}
.iconBtn{
  width:42px;height:42px;border-radius:16px;
  border:1px solid rgba(159,63,70,.12);
  background:rgba(255,250,244,.68);
  color:var(--red2);
  display:grid;place-items:center;
  font-weight:900;
  box-shadow:var(--soft);
}
.brandBlock{text-align:center;flex:1}
.brand{
  margin:0;
  font-size:40px;
  line-height:1;
  letter-spacing:-1px;
  font-weight:950;
}
.sub{
  color:var(--muted);
  font-weight:700;
  margin-top:8px;
  font-size:15px;
}
.card{
  background:rgba(255,250,244,.86);
  border:1px solid rgba(159,63,70,.12);
  border-radius:28px;
  padding:16px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
}
.nowCard{
  position:relative;
  overflow:hidden;
}
.nowCard:before{
  content:"";
  position:absolute;
  inset:-40px auto auto -45px;
  width:150px;height:150px;border-radius:50%;
  background:rgba(255,225,166,.55);
}
.nowBadge{
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:8px 12px;
  border-radius:999px;
  background:linear-gradient(135deg,var(--red),#db756c);
  color:white;
  font-weight:900;
  font-size:13px;
  box-shadow:0 7px 16px rgba(201,88,82,.22);
}
.nowContent{position:relative;z-index:1}
.nowGrid{
  display:grid;
  grid-template-columns:112px 1fr;
  gap:16px;
  align-items:center;
  margin-top:13px;
}
.cover{
  min-height:156px;
  border-radius:18px;
  background:
    radial-gradient(circle at 25% 20%,rgba(255,225,166,.7),transparent 28%),
    linear-gradient(150deg,#2b1415,#7d2e38 62%,#d07a67);
  color:#ffe2bf;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:12px;
  box-shadow:0 16px 26px rgba(43,20,21,.22);
  overflow:hidden;
  position:relative;
}
.cover:after{
  content:"♡";
  position:absolute;
  top:8px;left:10px;
  color:rgba(255,255,255,.55);
  font-size:24px;
}
.coverTitle{
  font-weight:950;
  font-size:18px;
  line-height:1.08;
}
.coverAuthor{font-size:12px;color:rgba(255,242,226,.78);margin-top:5px;font-weight:800}
.nowBookTitle{font-size:26px;font-weight:950;line-height:1.08;margin-bottom:5px}
.nowAuthor{color:var(--muted);font-weight:800}
.percentBig{
  font-size:50px;
  font-weight:950;
  color:var(--red);
  line-height:1;
  margin-top:12px;
}
.percentLbl{color:var(--muted);font-weight:800}
.progressBar{
  height:12px;
  background:#ecd3c7;
  border-radius:999px;
  overflow:hidden;
  margin-top:10px;
}
.progressFill{
  height:100%;
  width:0;
  background:linear-gradient(90deg,var(--wine),var(--red),#e49772);
  border-radius:999px;
}
.vibeRow{
  margin:12px 0 0;
  display:flex;
  align-items:center;
  gap:8px;
  background:rgba(255,255,255,.58);
  border:1px solid rgba(159,63,70,.10);
  border-radius:18px;
  padding:10px 12px;
  font-weight:900;
}
.vibeEmoji{font-size:28px}
.mainAction{
  width:100%;
  border:0;
  border-radius:22px;
  padding:17px 20px;
  margin-top:14px;
  color:white;
  background:linear-gradient(135deg,var(--red),var(--red2));
  font-weight:950;
  font-size:18px;
  box-shadow:0 15px 28px rgba(159,63,70,.24);
}
.secondaryAction{
  width:100%;
  border:1px solid rgba(159,63,70,.18);
  border-radius:20px;
  padding:14px 16px;
  margin-top:10px;
  color:var(--wine);
  background:rgba(255,250,244,.72);
  font-weight:900;
}
.sectionHead{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:22px 2px 10px;
}
.sectionTitle{font-size:18px;font-weight:950}
.textBtn{
  border:0;background:transparent;color:var(--red2);font-weight:900;padding:4px 0;
}
.momentList{display:grid;gap:8px}
.moment{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:9px;
  background:rgba(255,250,244,.74);
  border:1px solid rgba(159,63,70,.10);
  border-radius:18px;
  padding:10px 11px;
  box-shadow:var(--soft);
}
.momentType{
  width:36px;height:36px;border-radius:13px;
  display:grid;place-items:center;
  background:rgba(201,88,82,.12);
}
.momentMeta{color:var(--muted);font-size:12px;font-weight:900;margin-bottom:2px}
.momentText{font-weight:800;line-height:1.35}
.shelfRow{
  display:flex;gap:10px;overflow:auto;padding-bottom:7px;
}
.bookSmall{
  flex:0 0 100px;
  min-height:142px;
  border-radius:18px;
  background:linear-gradient(150deg,#321818,#80343f 60%,#d38167);
  color:#fff2e3;
  padding:10px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  box-shadow:0 12px 22px rgba(60,24,22,.18);
}
.bookSmallTitle{font-weight:950;line-height:1.08}
.bookSmallMeta{font-size:12px;color:rgba(255,242,226,.75);font-weight:800;margin-top:5px}
.empty{
  text-align:center;
  color:var(--muted);
  font-weight:800;
  padding:28px 16px;
}
.nav{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  bottom:14px;
  width:min(398px,calc(100% - 28px));
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  background:rgba(255,250,244,.86);
  border:1px solid rgba(159,63,70,.13);
  border-radius:25px;
  padding:8px;
  box-shadow:0 15px 40px rgba(76,34,28,.17);
  backdrop-filter:blur(10px);
  z-index:10;
}
.nav button{
  border:0;background:transparent;border-radius:18px;
  padding:9px 3px;color:#876156;font-weight:900;font-size:12px;
}
.nav button.on{background:rgba(201,88,82,.13);color:var(--red2)}
.pageHead{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.pageTitle{
  font-size:28px;font-weight:950;line-height:1.05;flex:1;
}
.fieldHero{
  background:linear-gradient(145deg,var(--red2),#b94f51);
  color:white;
  border-radius:0 0 30px 30px;
  margin:-18px -16px 16px;
  padding:18px 16px 20px;
  box-shadow:0 15px 35px rgba(117,45,63,.22);
}
.fieldHero .iconBtn{
  background:rgba(255,255,255,.14);
  color:white;
  border-color:rgba(255,255,255,.18);
  box-shadow:none;
}
.fieldTopRow{display:flex;align-items:center;gap:10px}
.fieldTitle{font-size:31px;font-weight:950;flex:1}
.fieldBook{
  margin-top:14px;
  background:rgba(255,250,244,.92);
  color:var(--ink);
  border-radius:22px;
  padding:12px;
  display:grid;
  grid-template-columns:1fr 70px;
  gap:12px;
  align-items:center;
}
.fieldBookName{font-weight:950;font-size:18px}
.fieldBookAuthor{color:var(--muted);font-weight:800;font-size:13px}
.fieldPercent{font-size:30px;font-weight:950;color:var(--red)}
.accordion{display:grid;gap:11px}
.accCard{
  background:rgba(255,250,244,.88);
  border:1px solid rgba(159,63,70,.12);
  border-radius:24px;
  box-shadow:var(--soft);
  overflow:hidden;
}
.accHead{
  width:100%;
  border:0;background:transparent;
  padding:15px 15px;
  display:flex;align-items:center;gap:10px;text-align:right;
}
.accIcon{
  width:38px;height:38px;border-radius:14px;
  display:grid;place-items:center;
  background:rgba(201,88,82,.12);
  color:var(--red2);
  font-size:20px;
}
.accTitle{font-weight:950;font-size:17px;flex:1}
.accChevron{color:var(--muted);font-weight:950}
.accBody{display:none;padding:0 15px 15px}
.accCard.open .accBody{display:block}
.input,.textarea{
  width:100%;
  border:1px solid rgba(159,63,70,.16);
  background:#fffdf9;
  border-radius:18px;
  padding:13px 14px;
  color:var(--ink);
  outline:none;
  font-weight:800;
}
.textarea{min-height:105px;resize:vertical;line-height:1.45}
.help{color:var(--muted);font-weight:800;font-size:13px;margin:7px 1px 10px}
.inline{
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  align-items:center;
}
.saveBtn,.pillBtn{
  border:0;border-radius:18px;
  background:linear-gradient(135deg,var(--red),var(--red2));
  color:white;
  font-weight:950;
  padding:12px 16px;
}
.pillBtn{
  border-radius:999px;
  padding:10px 14px;
  font-size:13px;
}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  border:1px solid rgba(159,63,70,.14);
  background:#fffdf9;
  color:var(--ink);
  border-radius:999px;
  padding:10px 13px;
  font-weight:900;
}
.chip.on{background:var(--red);color:white;border-color:var(--red)}
.charList{display:grid;gap:8px;margin-top:12px}
.charRow{
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  align-items:center;
  background:#fffdf9;
  border:1px solid rgba(159,63,70,.11);
  border-radius:17px;
  padding:10px 11px;
}
.charName{font-weight:950}
.charMeta{color:var(--muted);font-weight:800;font-size:12px}
.miniBtn{
  border:1px solid rgba(159,63,70,.16);
  background:rgba(255,250,244,.8);
  color:var(--red2);
  border-radius:13px;
  padding:8px 10px;
  font-weight:900;
}
.bottomMoments{
  margin-top:14px;
}
.summaryHero{
  background:linear-gradient(145deg,var(--red2),#b95255);
  color:white;
  border-radius:0 0 30px 30px;
  margin:-18px -16px 16px;
  padding:18px 16px 20px;
}
.summaryTitle{font-size:33px;font-weight:950;flex:1}
.stepCard{
  background:rgba(255,250,244,.9);
  border:1px solid rgba(159,63,70,.12);
  border-radius:25px;
  padding:15px;
  box-shadow:var(--soft);
  margin-bottom:11px;
}
.stepTitle{font-size:19px;font-weight:950;margin-bottom:10px}
.rateGroup{margin:10px 0 15px}
.rateLabel{font-weight:950;color:var(--wine);margin-bottom:8px}
.rateBtns{display:flex;gap:7px;flex-wrap:wrap}
.rateBtn{
  min-width:48px;
  border:1px solid rgba(159,63,70,.14);
  border-radius:15px;
  background:#fffdf9;
  padding:10px 11px;
  font-weight:950;
}
.rateBtn.on{background:var(--red);color:white;border-color:var(--red)}
.doneBtn{
  width:100%;
  border:0;
  margin-top:8px;
  border-radius:22px;
  padding:17px 20px;
  color:white;
  background:linear-gradient(135deg,var(--wine),var(--red2));
  font-size:20px;
  font-weight:950;
  box-shadow:0 15px 28px rgba(117,45,63,.24);
}
.tagSmall{
  display:inline-flex;
  border-radius:999px;
  padding:5px 9px;
  background:rgba(201,88,82,.12);
  color:var(--red2);
  font-size:12px;
  font-weight:900;
}
.toast{
  position:fixed;
  bottom:91px;
  left:50%;
  transform:translateX(-50%) translateY(10px);
  background:#2a1715;
  color:white;
  padding:11px 16px;
  border-radius:999px;
  font-weight:900;
  opacity:0;
  pointer-events:none;
  transition:.2s;
  z-index:30;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* v7 — סטטיסטיקה + הוספת דמות בתוך מסכמת */
.statsGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.statTile{
  background:rgba(255,250,244,.88);
  border:1px solid rgba(159,63,70,.12);
  border-radius:24px;
  padding:15px;
  box-shadow:var(--soft);
  min-height:112px;
}
.statNum{
  font-size:34px;
  font-weight:950;
  color:var(--red2);
  line-height:1;
}
.statLbl{
  color:var(--muted);
  font-weight:900;
  margin-top:7px;
}
.statHero{
  background:
    radial-gradient(circle at left top,rgba(255,225,166,.62),transparent 32%),
    linear-gradient(145deg,#fffaf4,#f3d1c4);
  border:1px solid rgba(159,63,70,.13);
  border-radius:30px;
  padding:18px;
  box-shadow:var(--shadow);
  margin-bottom:14px;
}
.statHeroTitle{
  font-size:30px;
  font-weight:950;
  line-height:1.05;
}
.statHeroSub{
  color:var(--muted);
  font-weight:850;
  margin-top:7px;
}
.summaryAddBox{
  margin-top:10px;
  padding:12px;
  border-radius:20px;
  background:#fffdf9;
  border:1px dashed rgba(159,63,70,.25);
}


/* v8 — פרטי ספר מלאים + מחיקה */
.detailHeroCard{
  background:linear-gradient(145deg,#fffaf4,#f1d1c2);
  border:1px solid rgba(159,63,70,.13);
  border-radius:30px;
  padding:16px;
  box-shadow:var(--shadow);
  margin-bottom:12px;
}
.detailGrid{
  display:grid;
  grid-template-columns:112px 1fr;
  gap:14px;
  align-items:center;
}
.detailActions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
  margin-top:12px;
}
.dangerBtn{
  border:1px solid rgba(159,63,70,.25);
  color:#8b2635;
  background:rgba(255,250,244,.82);
  border-radius:20px;
  padding:14px 16px;
  font-weight:950;
}
.fullSection{
  background:rgba(255,250,244,.9);
  border:1px solid rgba(159,63,70,.12);
  border-radius:24px;
  padding:15px;
  box-shadow:var(--soft);
  margin-bottom:11px;
}
.fullTitle{
  font-size:18px;
  font-weight:950;
  margin-bottom:10px;
  color:var(--wine);
}
.infoLine{
  display:grid;
  gap:5px;
  margin:10px 0;
}
.infoLbl{
  color:var(--muted);
  font-weight:900;
  font-size:13px;
}
.infoTxt{
  font-weight:850;
  line-height:1.45;
}
.deleteConfirm{
  position:fixed;
  inset:0;
  background:rgba(42,23,21,.38);
  display:none;
  place-items:end center;
  z-index:50;
  padding:16px;
}
.deleteConfirm.show{display:grid}
.confirmBox{
  width:min(430px,100%);
  background:#fffaf4;
  border:1px solid rgba(159,63,70,.16);
  border-radius:28px;
  padding:18px;
  box-shadow:0 25px 70px rgba(42,23,21,.30);
}
.confirmTitle{
  font-size:22px;
  font-weight:950;
}
.confirmText{
  color:var(--muted);
  font-weight:800;
  margin:7px 0 14px;
}


/* v9 — תיקוני אמת: סטטיסטיקה, דמויות, פרטי ספר ומחיקה */
.statsGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.statTile{
  background:rgba(255,250,244,.88);
  border:1px solid rgba(159,63,70,.12);
  border-radius:24px;
  padding:15px;
  box-shadow:var(--soft);
  min-height:112px;
}
.statNum{
  font-size:34px;
  font-weight:950;
  color:var(--red2);
  line-height:1;
}
.statLbl{
  color:var(--muted);
  font-weight:900;
  margin-top:7px;
}
.statHero{
  background:radial-gradient(circle at left top,rgba(255,225,166,.62),transparent 32%),linear-gradient(145deg,#fffaf4,#f3d1c4);
  border:1px solid rgba(159,63,70,.13);
  border-radius:30px;
  padding:18px;
  box-shadow:var(--shadow);
  margin-bottom:14px;
}
.statHeroTitle{
  font-size:30px;
  font-weight:950;
  line-height:1.05;
}
.statHeroSub{
  color:var(--muted);
  font-weight:850;
  margin-top:7px;
}


/* v11 — אייקונים סופיים + חיפוש יציב */
.ratingLine{
  display:inline-flex;
  align-items:center;
  flex-wrap:wrap;
  gap:7px;
}
.ratingStack{
  display:inline-flex;
  align-items:center;
  gap:3px;
}
.ratingSvg{
  width:18px;
  height:18px;
  display:inline-block;
  vertical-align:middle;
}
.ratingSvg svg{
  width:100%;
  height:100%;
  display:block;
}
.rateBtn .ratingStack{
  justify-content:center;
}
.rateBtn.on .ratingSvg svg *{
  fill:#fffaf4 !important;
  stroke:#fffaf4 !important;
}
.speedBox{
  display:grid;
  gap:10px;
}
.speedLabels{
  display:flex;
  justify-content:space-between;
  gap:5px;
  color:var(--muted);
  font-size:11px;
  font-weight:900;
}
.speedLabels span{
  max-width:58px;
  text-align:center;
}
.speedSlider{
  width:100%;
  accent-color:var(--red2);
}
.speedValue{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:9px 13px;
  border-radius:999px;
  background:rgba(201,88,82,.12);
  color:var(--red2);
  font-weight:950;
  width:max-content;
}
.shelfSearch{
  margin:3px 0 14px;
}
.searchEmpty{
  text-align:center;
  color:var(--muted);
  font-weight:850;
  padding:22px 12px;
}
.statNum .ratingSvg{
  width:16px;
  height:16px;
}


/* v12 — מיון וסינון במדף */
.shelfTools{
  display:grid;
  gap:9px;
  margin:3px 0 14px;
}
.toolRow{
  display:flex;
  gap:8px;
  align-items:center;
  overflow-x:auto;
  padding-bottom:2px;
}
.toolBtn{
  border:1px solid rgba(159,63,70,.16);
  background:rgba(255,250,244,.84);
  color:var(--red2);
  border-radius:999px;
  padding:10px 13px;
  font-weight:950;
  white-space:nowrap;
}
.toolBtn.on{
  background:var(--red);
  color:white;
  border-color:var(--red);
}
.activeFilters{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:-3px;
}
.filterTag{
  display:inline-flex;
  align-items:center;
  gap:5px;
  border-radius:999px;
  padding:6px 9px;
  background:rgba(201,88,82,.12);
  color:var(--red2);
  font-size:12px;
  font-weight:950;
}
.filterPanel{
  display:none;
  background:rgba(255,250,244,.9);
  border:1px solid rgba(159,63,70,.12);
  border-radius:24px;
  padding:13px;
  box-shadow:var(--soft);
}
.filterPanel.open{display:block}
.filterGroup{
  margin-bottom:13px;
}
.filterGroup:last-child{margin-bottom:0}
.filterTitle{
  color:var(--wine);
  font-weight:950;
  margin-bottom:8px;
}
.filterChips{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
}
.filterChip{

/* ===== v32 rebuild editorial ===== */
:root{
  --paper:#f6f1e8;

  --muted:#8f8578;
  --sage:#a4af97;
  --sage-deep:#667456;
  --accent:#df9367;
  --accent-soft:#efd0b9;
  --gold:#c6a24a;
}
html,body{background:var(--paper)!important;color:var(--ink)!important}
body,.phone{background:var(--paper)!important;color:var(--ink)!important}
.screen{background:transparent!important}

.brandBlock,.editorialBrand{flex:1;text-align:center}
.brand,.editorialBrand h1{margin:0;font-size:28px;line-height:1.1;color:#324534;font-weight:900;letter-spacing:.01em}
.sub,.editorialBrand .sub{color:var(--muted);font-size:15px;margin-top:6px;font-weight:700}
.brandEyebrow,.eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#aba092;font-weight:900}
.iconBtn{width:52px;height:52px;border-radius:50%;border:1px solid var(--line);background:rgba(255,255,255,.65)!important;box-shadow:0 8px 18px rgba(99,84,67,.08);color:#7e7263!important}
.iconBtn .neonIcon,.navIcon,.bubbleIcon,.momentType .neonIcon,.accIcon .neonIcon,.shelfKpiIcon .neonIcon,.statLeaderIcon .neonIcon,.backupBtn .neonIcon,.fieldQuickIcon .neonIcon,.orbHeart .neonIcon{color:#8c8376!important;filter:none!important}
.iconBtn .neonIcon .spark,.nav button.on .navIcon .spark,.neonIcon .spark{stroke:var(--gold)!important}
.pageTitle,.fieldTitle,.summaryTitle,.sectionTitle,.fullTitle,.stepTitle,.summaryOpenTitle,.fieldBookName,.shelfHeroTitle,.pageHead .pageTitle{color:#334735!important}
.sectionTitle,.fullTitle,.stepTitle{font-size:16px!important}
.textBtn{color:#8f8578!important;font-weight:800}
.nav{background:rgba(253,250,244,.96)!important;border:1px solid var(--line)!important;box-shadow:0 14px 34px rgba(85,73,57,.10)!important}

.input,.textarea,.shelfSearchInput{background:#fffdfa!important;border:1px solid var(--line)!important;color:var(--ink)!important;box-shadow:none!important}
.input::placeholder,.textarea::placeholder{color:#b1a699}
.saveBtn,.doneBtn,.bubbleAction.primary,.backupBtn,.primaryPill,.primaryHeroBtn,.shelfAddBtn,.pillBtn{background:linear-gradient(135deg,#de956c,#e7a57b)!important;border:0!important;color:white!important;box-shadow:0 12px 26px rgba(223,147,103,.25)!important}
.secondaryAction,.secondaryPill,.toolBtn,.tinyAction,.backupBtn.restore{background:var(--card-soft)!important;border:1px solid var(--line)!important;color:#6a6258!important;box-shadow:none!important}

.chip,.filterChip{background:#fbf7f0!important;border:1px solid var(--line)!important;color:#6f675d!important}

<script>
const KEY='od-perek-ehad-v5';
const OLD_KEYS=['od-perek-ehad-v1'];
const MOODS=['נמרח','זורם','מתחיל לקרות משהו','מכורה','לא לדבר איתי','עצבנית עליו','הלב שלי לא בנוי לזה','וואו וואו וואו','חמוד בינתיים','לא סגורה עליו','מחכה שיתפוצץ','יש דגל אדום ואני מתעלמת','הוא בעייתי ואני בעייתית','רוצה לנער את כולם','אני לא נושמת','זה מתחיל לשרוף','זקוקה להפסקה','אוקיי עכשיו הבנתי'];
const CHAR_TAGS=['אוהב/ת','מחבבת בינתיים','חשוד/ה','מעצבן/ת','רוצה עוד ממנו/ממנה','דגל אדום','דגל ירוק','Book boyfriend / Book girlfriend','צריכ/ה טיפול','לא סגורה עליו/עליה','מתחיל/ה לגדול עליי','בא לי לנער אותו/ה','לא אמין/ה לי','מסתיר/ה משהו','מסוכן/ת אבל מעניין','חמוד/ה מדי','בעיה מהלכת','נשמה טובה','שונאת שאכפת לי','בינתיים לא קונה את זה','אובססיה בהתהוות','צריך/ה עמוד שדרה'];
const FINAL_CHAR_TAGS=['נשאר/ה לי בראש','אהוב/ה עליי','בעייתי/ת אבל מה לעשות','דגל אדום מפואר','דגל ירוק נדיר','בלתי נסבל/ת','הייתי צריכה יותר ממנו/ה','לא סלחתי','מלך/מלכה','שונאת שאהבתי','לא קניתי אותו/ה','הפתיע/ה לטובה','הרס/ה לי את העצבים','הייתי קוראת עליו/עליה ספר שלם','שכחתי ממנו/ממנה'];
const CHARACTER_GREEN_FLAGS=['מגונן/ת','נאמן/ה','מצחיק/ה','רך/ה במקום הנכון','כנה','חכם/ה','מפרגנ/ת','נותנ/ת ביטחון','יודע/ת להתנצל'];
const CHARACTER_RED_FLAGS=['מסתיר/ה משהו','מניפולטיבי/ת','דרמה מהלכת','יותר מדי שקט/ה','מתנשא/ת','בורח/ת מרגש','לא מתקשר/ת','מסוכן/ת מדי','צריך/ה טיפול דחוף'];
const CHARACTER_STANCES=['בעדו/בעדה','חשוד/ה','לא סגורה עליו/עליה','תפסיק/י לדבר','שווה לעקוב','אני מאמינה לו/לה','לא קונה את זה','אהבתי למרות הכל'];
const MOMENT_TAGS=['רגע וואו','רגע עצבים','רגע לב','רגע חשוב','לא יצא לי מהראש'];
const BOTTOM_LINES=['נשאר לי בראש','בלעתי בלי לנשום','לא לדבר איתי','אהבתי אבל יש לי תלונות','חמוד ותו לא','הייתי עוברת לגור שם','לא התאוששתי','צריכה ספר המשך עכשיו'];
const SPEED=['נמרח','לקח זמן','זרם','מהר','בלעתי'];
let S=loadState();
let openAcc='percent';
let currentScreen='home';
let shelfSearch='';
let shelfSort='recent';
let shelfMode='finished';
let shelfFilters={bottomLine:'',stars:0,heat:0,cry:0,speed:0,char:''};
let shelfFilterOpen=false;
let editBookDraft=null;
let shelfSortOpen=false;

function uniqueList(arr){
  return [...new Set((arr||[]).map(x=>String(x||'').trim()).filter(Boolean))];
}
function allMoodTags(){
  return uniqueList([...(MOODS||[]), ...((S&&S.customMoodTags)||[])]);
}
function allCharTags(){
  return uniqueList([...(CHAR_TAGS||[]), ...((S&&S.customCharTags)||[])]);
}
function allStampTags(){
  return uniqueList([...(BOTTOM_LINES||[]), ...((S&&S.customStampTags)||[])]);
}
function addCustomMoodTag(){
  const tag=(prompt('איזו תגית וייב תרצי להוסיף?')||'').trim();
  if(!tag) return;
  S.customMoodTags=uniqueList([...(S.customMoodTags||[]), tag]);
  save();
  renderField();
  toast('תגית הוייב נשמרה');
}
function addCustomCharTag(){
  const tag=(prompt('איזו תגית דמות תרצי להוסיף?')||'').trim();
  if(!tag) return;
  S.customCharTags=uniqueList([...(S.customCharTags||[]), tag]);
  save();
  renderField();
  toast('תגית הדמות נשמרה');
}
function addCustomStampTag(){
  const tag=(prompt('איזו חותמת תרצי להוסיף?')||'').trim();
  if(!tag) return;
  S.customStampTags=uniqueList([...(S.customStampTags||[]), tag]);
  save();
  renderSummary();
  toast('החותמת נשמרה');
}

function customTagConfig(kind){
  const configs={
    mood:{title:'תגיות וייב',list:'customMoodTags',defaults:MOODS},
    char:{title:'תגיות דמות',list:'customCharTags',defaults:CHAR_TAGS},
    stamp:{title:'חותמות ספר',list:'customStampTags',defaults:BOTTOM_LINES}
  };
  return configs[kind]||configs.mood;
}
function renderCustomTagsPanel(){
  return `<section class="tagManagePanelV44">
    <h3>ניהול תגיות אישיות</h3>
    <p>כאן אפשר לערוך או למחוק רק תגיות שאת הוספת בעצמך. תגיות ברירת המחדל נשארות כמו שהן.</p>
    ${renderCustomTagGroup('mood')}
    ${renderCustomTagGroup('char')}
    ${renderCustomTagGroup('stamp')}
  </section>`;
}
function renderCustomTagGroup(kind){
  const cfg=customTagConfig(kind);
  const list=uniqueList(S[cfg.list]||[]);
  return `<div class="tagGroupV44">
    <div class="tagGroupHeadV44"><div class="tagGroupTitleV44">${cfg.title}</div><div class="tagGroupCountV44">${list.length} אישיות</div></div>
    ${list.length?`<div class="tagListV44">${list.map(t=>`<div class="tagItemV44"><div class="tagNameV44">${esc(t)}</div><div class="tagActionsV44"><button class="tagMiniBtnV44" onclick="renameCustomTag('${kind}','${jsEsc(t)}')">עריכה</button><button class="tagMiniBtnV44 danger" onclick="deleteCustomTag('${kind}','${jsEsc(t)}')">מחיקה</button></div></div>`).join('')}</div>`:`<div class="tagEmptyV44">עוד לא הוספת תגיות אישיות בקטגוריה הזאת.</div>`}
  </div>`;
}
function renameCustomTag(kind,oldTag){
  const cfg=customTagConfig(kind);
  const next=(prompt('שם חדש לתגית:',oldTag)||'').trim();
  if(!next || next===oldTag)return;
  const existing=uniqueList([...(cfg.defaults||[]), ...(S[cfg.list]||[])]).filter(x=>x!==oldTag);
  if(existing.includes(next)){toast('כבר קיימת תגית כזאת');return}
  S[cfg.list]=uniqueList((S[cfg.list]||[]).map(x=>x===oldTag?next:x));
  migrateCustomTag(kind,oldTag,next);
  save();
  render();
  toast('התגית עודכנה');
}
function deleteCustomTag(kind,tag){
  const cfg=customTagConfig(kind);
  if(!confirm(`למחוק את "${tag}" מהרשימה האישית?\\nשימושים שכבר נשמרו בספרים יישארו כמו שהם.`))return;
  S[cfg.list]=uniqueList((S[cfg.list]||[]).filter(x=>x!==tag));
  save();
  render();
  toast('התגית נמחקה מהרשימה');
}
function migrateCustomTag(kind,oldTag,newTag){
  const replaceMood=(u)=>{if(u&&u.type==='mood'){if(u.label===oldTag)u.label=newTag;if(u.text===oldTag)u.text=newTag;}};
  const replaceChar=(ch)=>{if(ch&&ch.tag===oldTag)ch.tag=newTag;if(ch&&ch.finalTag===oldTag)ch.finalTag=newTag;};
  if(kind==='mood'){
    if(S.current){
      if(S.current.lastMood===oldTag)S.current.lastMood=newTag;
      (S.current.updates||[]).forEach(replaceMood);
    }
    (S.books||[]).forEach(b=>(b.readingLog||[]).forEach(replaceMood));
  }
  if(kind==='char'){
    if(S.current)(S.current.characters||[]).forEach(replaceChar);
    (S.books||[]).forEach(b=>(b.characters||[]).forEach(replaceChar));
  }
  if(kind==='stamp'){
    if(S.summaryDraft&&S.summaryDraft.bottomLine===oldTag)S.summaryDraft.bottomLine=newTag;
    if(shelfFilters&&shelfFilters.bottomLine===oldTag)shelfFilters.bottomLine=newTag;
    (S.books||[]).forEach(b=>{if(b.bottomLine===oldTag)b.bottomLine=newTag;});
  }
}
function addCustomStampTagFromEdit(bookId){
  const tag=(prompt('איזו חותמת תרצי להוסיף?')||'').trim();
  if(!tag) return;
  S.customStampTags=uniqueList([...(S.customStampTags||[]), tag]);
  if(editBookDraft) editBookDraft.bottomLine=tag;
  save();
  renderBookEdit(bookId);
  toast('החותמת נשמרה');
}

function loadState(){
  try{
    const cur=localStorage.getItem(KEY);
    if(cur) return normalize(JSON.parse(cur));
    for(const k of OLD_KEYS){
      const old=localStorage.getItem(k);
      if(old){
        const o=JSON.parse(old);
        return normalize({books:o.books||[],current:o.current||null});
      }
    }
  }catch(e){}
  return normalize({books:[],current:null});
}

function normalize(s){
  s.books=Array.isArray(s.books)?s.books:[];
  s.current=s.current||null;
  s.customMoodTags=uniqueList(s.customMoodTags||[]);
  s.customCharTags=uniqueList(s.customCharTags||[]);
  s.customStampTags=uniqueList(s.customStampTags||[]);
  s.books=s.books.map(normalizeBook);
  if(s.current) s.current=normalizeCurrent(s.current);
  return s;
}
function normalizeBook(b){
  b.id=b.id||id();
  b.title=b.title||'';
  b.author=b.author||'';
  b.stars=+b.stars||0;
  b.heat=+b.heat||0;
  b.cry=+b.cry||0;
  b.speed=+b.speed||0;
  b.status=b.status||'finished';
  b.coverVariant=(b.coverVariant===0||b.coverVariant)?Math.max(0,Math.min(3,parseInt(b.coverVariant)||0)):coverVariantFrom(b.title,b.author,b.id);
  b.coverImage=b.coverImage||'';
  b.stuckDismissedUntil=b.stuckDismissedUntil||'';
  b.abandonReason=b.abandonReason||'';
  b.abandonMood=b.abandonMood||'';
  b.abandonedAt=b.abandonedAt||'';

  const updateTimes=(c.updates||[]).map(updateTimestamp).filter(Boolean);

  c.updates.unshift({id:id(),type:'progress',label:'איפה אני',text:`הגעתי ל־${pct(percent)}%`,percent:pct(percent),ts:now,createdAt:now,readingState:readingStateForMoment('progress','איפה אני',`הגעתי ל־${pct(percent)}%`,pct(percent))});

  const b=normalizeBook({
    id:c.id,title:c.title,author:c.author,createdAt:new Date().toISOString(),status:'abandoned',
    abandonReason:reason,abandonMood:'',abandonedAt:new Date().toISOString(),

  const raw=prompt('למה נטשתי?',b.abandonReason||'');
  if(raw===null)return;
  b.abandonReason=raw.trim();b.abandonMood='';save();openBook(bookId);toast('סיבת הנטישה עודכנה');
}
function restoreAbandonedBook(bookId){
  const b=S.books.find(x=>x.id===bookId);if(!b)return;
  if(S.current && !confirm('יש כבר ספר פעיל. להחליף אותו בספר הזה? הספר הפעיל הנוכחי לא יישמר אוטומטית.'))return;
  S.current=normalizeCurrent({id:b.id,title:b.title,author:b.author,percent:pct(b.percent||0),updates:b.readingLog||[],characters:b.characters||[],startedAt:new Date().toISOString(),coverImage:b.coverImage||'',lastActivityAt:new Date().toISOString(),stuckDismissedUntil:''});
  S.books=S.books.filter(x=>x.id!==bookId);
  save();show('home');toast('הספר חזר לקריאה');
}

  shelfSearch='';

function activeShelfFiltersHtml(){
  const tags=[];
  if(shelfMode==='abandoned') tags.push('נטשתי');
  if(shelfSearch.trim()) tags.push(`חיפוש: ${shelfSearch.trim()}`);
  if(shelfSort!=='recent') tags.push(`מיון: ${sortLabel(shelfSort)}`);
  if(shelfFilters.bottomLine) tags.push(shelfFilters.bottomLine);
  if(shelfFilters.stars) tags.push(`${shelfFilters.stars} לבבות`);
  if(shelfFilters.heat) tags.push(`${shelfFilters.heat} פלפלים`);
  if(shelfFilters.cry) tags.push(`${shelfFilters.cry} לב שבור`);
  if(shelfFilters.speed) tags.push(SPEED[shelfFilters.speed-1]);
  if(shelfFilters.char==='redflag') tags.push('יש דגל אדום');
  if(shelfFilters.char==='bookbf') tags.push('Book boyfriend/girlfriend');
  if(shelfFilters.char==='stuck') tags.push('נשאר/ה לי בראש');
  return tags.length?`<div class="activeFilters">${tags.map(t=>`<span class="filterTag">${esc(t)}</span>`).join('')}</div>`:'';
}
function matchesShelfFilters(b){
  const f=shelfFilters;
  if(f.bottomLine && b.bottomLine!==f.bottomLine) return false;
  if(f.stars && (+b.stars||0)!==f.stars) return false;
  if(f.heat && (+b.heat||0)!==f.heat) return false;
  if(f.cry && (+b.cry||0)!==f.cry) return false;
  if(f.speed && (+b.speed||0)!==f.speed) return false;
  if(f.char){
    const chars=b.characters||[];
    if(f.char==='redflag' && !chars.some(c=>c.redFlag||String(c.tag||'').includes('דגל אדום')||String(c.finalTag||'').includes('דגל אדום'))) return false;
    if(f.char==='bookbf' && !chars.some(c=>String(c.tag||'').toLowerCase().includes('book boyfriend')||String(c.tag||'').toLowerCase().includes('book girlfriend'))) return false;
    if(f.char==='stuck' && !chars.some(c=>String(c.finalTag||'').includes('נשאר'))) return false;
  }
  return true;
}
function sortShelfBooks(arr){
  return [...arr].sort((a,b)=>{
    if(shelfSort==='recent') return new Date(b.createdAt||0)-new Date(a.createdAt||0);
    if(shelfSort==='love') return (+b.stars||0)-(+a.stars||0);
    if(shelfSort==='heat') return (+b.heat||0)-(+a.heat||0);
    if(shelfSort==='cry') return (+b.cry||0)-(+a.cry||0);
    if(shelfSort==='fast') return (+b.speed||0)-(+a.speed||0);
    if(shelfSort==='slow') return (+a.speed||9)-(+b.speed||9);
    if(shelfSort==='title') return String(a.title||'').localeCompare(String(b.title||''),'he');
    if(shelfSort==='author') return String(a.author||'').localeCompare(String(b.author||''),'he');
    return 0;
  });
}

function shelfResultsHtml(){
  const q=(shelfSearch||'').trim().toLowerCase();
  const mode=shelfMode==='abandoned'?'abandoned':'finished';
  const allInMode=S.books.filter(b=>(b.status||'finished')===mode);
  let books=allInMode.filter(b=>!q || searchBookText(b).includes(q));
  books=books.filter(matchesShelfFilters);
  books=sortShelfBooks(books);
  if(!S.books.length) return `<div class="emptyNew">עוד אין ספרים במדף. הראשון שיסתיים או יינטש יופיע כאן.</div>`;
  if(!allInMode.length) return `<div class="emptyNew">${mode==='abandoned'?'עוד אין ספרים שנטשת. מרשים, או מדאיג.':'עוד אין ספרים שסיימת. כשהראשון ייכנס למדף — הכל יתמלא כאן.'}</div>`;
  if(!books.length) return `<div class="emptyNew">לא מצאתי שום דבר שמתאים לחיפוש או לסינון שבחרת.</div>`;
  return `<div class="shelfGridEditorial">${books.map(bookRow).join('')}</div>`;
}
function bookRow(b){
  const topChar=(b.characters||[]).find(ch=>ch.finalTag)||(b.characters||[])[0]||null;
  const isAbandoned=(b.status||'finished')==='abandoned';
  const excerpt=isAbandoned?(b.abandonReason||'ננטש בלי סיבה רשומה'):(b.madeMe || b.about || '');
  return `<button class="shelfCardNew ${isAbandoned?'abandonedV45':''}" onclick="openBook('${b.id}')">${coverHtml(b.title,b.author,b)}<div class="shelfCardMeta"><div class="shelfCardTitle">${esc(b.title)}</div><div class="shelfCardAuthor">${esc(b.author)}</div><div class="shelfCardTags">${isAbandoned?`<span class="softPill">נטשתי ב־${pct(b.percent||0)}%</span>`:''}${b.bottomLine&&!isAbandoned?`<span class="softPill">${esc(b.bottomLine)}</span>`:''}${topChar&&!isAbandoned?`<span class="softPill">${esc(topChar.name)}</span>`:''}</div>${excerpt?`<div class="shelfCardSnippet">${esc(excerpt)}</div>`:''}</div></button>`;
}

function friendReasonsV63(){return ['אותו וייב','אותה דרמה','אותו כאב','אותו גבר בעייתי','אותה התמכרות','אותה סופרת','לא יודעת, זה הזכיר לי']}
function friendReasonChoiceV63(){
  const opts=friendReasonsV63();
  const raw=prompt('למה הספרים חברים?\n'+opts.map((x,i)=>`${i+1}. ${x}`).join('\n')+'\n\nאפשר גם לכתוב סיבה משלך');
  if(raw===null)return null;
  const t=String(raw||'').trim();
  if(!t)return 'לא יודעת, זה הזכיר לי';
  const n=parseInt(t,10);
  if(n>=1&&n<=opts.length)return opts[n-1];
  return t.slice(0,80);
}
function ownerBookV65(bookId){
  if(S.current&&S.current.id===bookId)return S.current;
  return S.books.find(x=>x.id===bookId)||null;
}
function friendSearchInputIdV65(bookId,context){return `friendSearch_${context}_${String(bookId).replace(/[^a-zA-Z0-9_-]/g,'_')}`}
function friendSearchResultsIdV65(bookId,context){return `friendResults_${context}_${String(bookId).replace(/[^a-zA-Z0-9_-]/g,'_')}`}
function friendCandidatesV65(ownerId,query=''){
  const owner=ownerBookV65(ownerId);if(!owner)return [];
  const existing=new Set((owner.bookFriends||[]).map(f=>f.bookId));
  const q=String(query||'').trim().toLowerCase();
  let candidates=(S.books||[]).filter(x=>x.id!==ownerId&&!existing.has(x.id));
  if(q){
    candidates=candidates.filter(x=>String(x.title||'').toLowerCase().includes(q)||String(x.author||'').toLowerCase().includes(q));
    candidates.sort((a,b)=>{
      const at=String(a.title||'').toLowerCase(), bt=String(b.title||'').toLowerCase();
      const aa=String(a.author||'').toLowerCase(), ba=String(b.author||'').toLowerCase();
      const ar=(at.startsWith(q)?0:aa.startsWith(q)?1:2), br=(bt.startsWith(q)?0:ba.startsWith(q)?1:2);
      return ar-br || at.localeCompare(bt,'he');
    });
  }else{
    candidates=candidates.slice().sort((a,b)=>String(a.title||'').localeCompare(String(b.title||''),'he'));
  }
  return candidates.slice(0,8);
}
function bookFriendSearchHtmlV65(ownerId,context='detail'){
  const owner=ownerBookV65(ownerId);if(!owner)return '';
  const canAdd=(S.books||[]).filter(x=>x.id!==ownerId && !(owner.bookFriends||[]).some(f=>f.bookId===x.id)).length>0;
  if(!canAdd)return `<div class="friendEmptyV63">אין כרגע עוד ספרים פנויים לקישור.</div>`;
  const inputId=friendSearchInputIdV65(ownerId,context), resultsId=friendSearchResultsIdV65(ownerId,context);
  return `<div class="bookFriendSearchV65"><label>לחפש ספר לקישור</label><div class="bookFriendSearchRowV65"><input id="${inputId}" class="input" placeholder="תתחילי לכתוב שם ספר או סופרת…" autocomplete="off" oninput="onFriendSearchV65('${ownerId}','${inputId}','${resultsId}','${context}')" onfocus="onFriendSearchV65('${ownerId}','${inputId}','${resultsId}','${context}')"><div id="${resultsId}" class="bookFriendResultsV65"><div class="bookFriendSearchHintV65">במקום רשימה אינסופית: מקלידה שתי אותיות, בוחרת ספר, ואז סיבת הקשר.</div></div></div></div>`;
}
function onFriendSearchV65(ownerId,inputId,resultsId,context='detail'){
  const input=document.getElementById(inputId), box=document.getElementById(resultsId);if(!input||!box)return;
  const q=input.value||'';
  const list=friendCandidatesV65(ownerId,q);
  if(!q.trim()){
    box.innerHTML=`<div class="bookFriendSearchHintV65">תתחילי לכתוב, נגיד רו, והאפליקציה תציע ספרים לפי שם או סופרת.</div>`;
    return;
  }
  if(!list.length){box.innerHTML=`<div class="bookFriendSearchHintV65">לא מצאתי ספר מתאים במדף. נסי שם ספר או שם סופרת.</div>`;return;}
  box.innerHTML=list.map(book=>friendSearchResultBtnV65(ownerId,book,context)).join('');
}
function friendSearchResultBtnV65(ownerId,book,context){
  const cover=coverHtml(book.title,book.author,book,{neutral:true}).replace('realCoverV50','realCoverV50 bookFriendResultCoverV65');
  return `<button class="bookFriendResultBtnV65" onclick="selectBookFriendV65('${ownerId}','${book.id}','${context}')">${cover}<span class="bookFriendResultMetaV65"><span class="bookFriendResultTitleV65">${esc(book.title)}</span><span class="bookFriendResultAuthorV65">${esc(book.author)}</span></span></button>`;
}
function selectBookFriendV65(ownerId,friendId,context='detail'){
  const reason=friendReasonChoiceV63();
  if(reason===null)return;
  linkBookFriendV65(ownerId,friendId,reason,context);
}
function linkBookFriendV65(ownerId,friendId,reason,context='detail'){
  const owner=ownerBookV65(ownerId);const other=S.books.find(x=>x.id===friendId);if(!owner||!other)return;
  const createdAt=new Date().toISOString();
  owner.bookFriends=owner.bookFriends||[];
  if(!owner.bookFriends.some(f=>f.bookId===other.id))owner.bookFriends.push({id:id(),bookId:other.id,reason,createdAt});
  other.bookFriends=other.bookFriends||[];
  if(!other.bookFriends.some(f=>f.bookId===owner.id))other.bookFriends.push({id:id(),bookId:owner.id,reason,createdAt});
  save();
  if(context==='field')renderField(); else openBook(ownerId);
  toast('הספרים קושרו');
}
function bookFriendsHtmlV63(b,context='detail'){
  const owner=ownerBookV65(b.id)||b;
  const friends=(owner.bookFriends||[]).map(f=>({link:f,book:S.books.find(x=>x.id===f.bookId)})).filter(x=>x.book);
  return `<div class="detailSectionNew bookFriendsSectionV63"><div class="bookFriendsHeadV63"><div><h3>חברים של הספר הזה</h3><p>ספרים שמזכירים אותו באותו וייב, כאב, דרמה או גבר בעייתי.</p></div></div>${bookFriendSearchHtmlV65(owner.id,context)}${friends.length?`<div class="friendGridV63" style="margin-top:12px">${friends.map(({link,book})=>friendCardV63(owner.id,book,link.reason,context)).join('')}</div>`:`<div class="friendEmptyV63" style="margin-top:12px">עוד לא קישרת לו חברים מהמדף. כשספר יזכיר לך ספר אחר — זה המקום לרכל על זה.</div>`}</div>`;
}
function friendCardV63(ownerId,book,reason,context='detail'){
  const cover=coverHtml(book.title,book.author,book,{neutral:true}).replace('realCoverV50','realCoverV50 friendCoverV63');
  return `<div class="friendCardV63">${cover}<div class="friendInfoV63"><div class="friendTitleV63">${esc(book.title)}</div><div class="friendAuthorV63">${esc(book.author)}</div><span class="friendReasonV63">${esc(reason||'ספר חבר')}</span><div class="friendActionsV63"><button onclick="openBook('${book.id}')">לפתוח</button><button class="danger" onclick="removeBookFriendV63('${ownerId}','${book.id}','${context}')">להסיר קשר</button></div></div></div>`;

function addBookFriendV63(bookId){
  const input=document.getElementById(friendSearchInputIdV65(bookId,'detail'))||document.getElementById(friendSearchInputIdV65(bookId,'field'));
  if(input){input.focus();toast('תתחילי להקליד שם ספר');return;}
  toast('פתחתי לך חיפוש חכם לקישור ספר');
}
function removeBookFriendV63(bookId,friendId,context='detail'){
  const b=ownerBookV65(bookId);const other=S.books.find(x=>x.id===friendId);if(!b)return;
  if(!confirm('להסיר את הקשר בין הספרים?'))return;
  b.bookFriends=(b.bookFriends||[]).filter(f=>f.bookId!==friendId);
  if(other) other.bookFriends=(other.bookFriends||[]).filter(f=>f.bookId!==bookId);
  save();
  if(context==='field')renderField(); else openBook(bookId);
  toast('הקשר הוסר');
}

function readAndResizeCoverImage(file,cb){
  if(!file)return;
  if(!file.type || !file.type.startsWith('image/')){toast('צריך לבחור תמונה');return;}
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const maxW=900,maxH=1350;
      let w=img.naturalWidth||img.width,h=img.naturalHeight||img.height;
      const r=Math.min(maxW/w,maxH/h,1);
      w=Math.round(w*r);h=Math.round(h*r);
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.fillStyle='#fbf6ee';ctx.fillRect(0,0,w,h);
      ctx.drawImage(img,0,0,w,h);
      cb(canvas.toDataURL('image/jpeg',0.82));
    };
    img.onerror=()=>toast('לא הצלחתי לפתוח את התמונה');
    img.src=String(reader.result||'');
  };
  reader.onerror=()=>toast('לא הצלחתי לקרוא את התמונה');
  reader.readAsDataURL(file);
}

  const input=document.createElement('input');

  input.onchange=()=>{const file=input.files&&input.files[0]; if(file) readAndResizeCoverImage(file,cb);};

function renderStats(){
  const el=document.getElementById('stats');
  if(!el)return;
  const allBooks=Array.isArray(S.books)?S.books:[];
  const finishedBooks=allBooks.filter(b=>(b.status||'finished')!=='abandoned');
  const abandonedBooks=allBooks.filter(b=>(b.status||'finished')==='abandoned');
  const books=finishedBooks;
  const total=finishedBooks.length;
  const abandonedTotal=abandonedBooks.length;
  const allTracked=total+abandonedTotal;
  const abandonmentRate=allTracked?Math.round((abandonedTotal/allTracked)*100):0;
  const avgAbandonedPercent=abandonedTotal?Math.round(abandonedBooks.reduce((sum,b)=>sum+(+b.percent||0),0)/abandonedTotal):0;
  const abandonReasons=abandonedBooks.map(b=>String(b.abandonReason||'').trim()).filter(Boolean);
  const now=new Date();
  const monthKey=now.toISOString().slice(0,7);
  const currentYear=String(now.getFullYear());
  const monthLabel=now.toLocaleDateString('he-IL',{month:'long',year:'numeric'});
  const safeDate=(x)=>{const d=new Date(x||0);return Number.isFinite(d.getTime())?d:null};
  const bookMonth=(b)=>{const d=safeDate(b.finishedAt||b.createdAt||b.updatedAt);return d?d.toISOString().slice(0,7):''};
  const bookYear=(b)=>{const d=safeDate(b.finishedAt||b.createdAt||b.updatedAt);return d?String(d.getFullYear()):''};
  const finishedThisMonth=finishedBooks.filter(b=>bookMonth(b)===monthKey).length;
  const abandonedThisMonth=abandonedBooks.filter(b=>bookMonth(b)===monthKey).length;
  const booksThisYear=finishedBooks.filter(b=>bookYear(b)===currentYear);
  const abandonedThisYear=abandonedBooks.filter(b=>bookYear(b)===currentYear);
  const avg=(key)=>{
    const vals=books.map(b=>+b[key]||0).filter(v=>v>0);
    return vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):'—';
  };
  const avgNum=(key)=>{
    const vals=books.map(b=>+b[key]||0).filter(v=>v>0);
    return vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length):0;
  };
  const maxBook=(key,min=false)=>{
    const vals=books.filter(b=>(+b[key]||0)>0);
    if(!vals.length)return null;
    return vals.sort((a,b)=>min?(+a[key]||0)-(+b[key]||0):(+b[key]||0)-(+a[key]||0))[0];
  };
  const allLogs=books.flatMap(b=>b.readingLog||[]);
  const allChars=books.flatMap(b=>(b.characters||[]).map(ch=>({...ch,bookTitle:b.title,bookId:b.id})));
  const allFriends=books.flatMap(b=>(b.bookFriends||[]).map(f=>({...f,ownerTitle:b.title,ownerId:b.id})));
  const common=(arr)=>{
    const map={};
    arr.forEach(x=>{const k=String(x||'').trim(); if(k)map[k]=(map[k]||0)+1;});
    return Object.entries(map).sort((a,b)=>b[1]-a[1])[0]||null;
  };
  const topMood=common(allLogs.filter(u=>u.type==='mood').map(u=>u.text||u.label));
  const topStamp=common(books.map(b=>b.bottomLine));
  const topAuthor=common(books.map(b=>b.author));
  const topFriendReason=common(allFriends.map(f=>f.reason));
  const mostLoggedBook=books.slice().sort((a,b)=>((b.readingLog||[]).length)-((a.readingLog||[]).length))[0]||null;
  const mostLoggedCount=mostLoggedBook?(mostLoggedBook.readingLog||[]).length:0;
  const friendCount=(b)=>Array.isArray(b.bookFriends)?b.bookFriends.length:0;
  const socialBook=books.filter(b=>friendCount(b)>0).sort((a,b)=>friendCount(b)-friendCount(a))[0]||null;
  const firstBookYear=booksThisYear.slice().sort((a,b)=>(safeDate(a.finishedAt||a.createdAt||a.updatedAt)||0)-(safeDate(b.finishedAt||b.createdAt||b.updatedAt)||0))[0]||null;
  const lastBook=books.slice().sort((a,b)=>(safeDate(b.finishedAt||b.createdAt||b.updatedAt)||0)-(safeDate(a.finishedAt||a.createdAt||a.updatedAt)||0))[0]||null;
  const authorRepeat=(topAuthor&&topAuthor[1]>1)?topAuthor:null;
  const heat=maxBook('heat'), cry=maxBook('cry'), stars=maxBook('stars'), fast=maxBook('speed'), slow=maxBook('speed',true), obsession=maxBook('obsession');
  const redFlagChars=allChars.filter(ch=>ch.redFlag||/דגל אדום|בעייתי|בעיה|חשוד/.test(`${ch.tag||''} ${ch.finalTag||''} ${ch.stance||''}`));
  const greenFlagChars=allChars.filter(ch=>ch.greenFlag||/דגל ירוק|נשמה טובה/.test(`${ch.tag||''} ${ch.finalTag||''}`));
  const redFlags=redFlagChars.length;
  const greenFlags=greenFlagChars.length;
  const suspiciousChar=redFlagChars[0]||null;
  const noTalk=allLogs.filter(u=>/לא לדבר איתי/.test(`${u.text||''} ${u.label||''}`)).length + books.filter(b=>/לא לדבר איתי/.test(`${b.bottomLine||''} ${b.madeMe||''} ${b.shimiLine||''}`)).length;
  const swallowed=books.filter(b=>(+b.speed||0)>=4).length;
  const warnings=books.filter(b=>String(b.readingWarning||'').trim()).length;
  const pitches=books.filter(b=>String(b.friendPitch||'').trim()).length;
  const readMoreYes=books.filter(b=>/ברור|כן|בטח|רצה|ארוץ/i.test(String(b.readMoreAuthor||''))).length;
  const avgObs=avgNum('obsession');
  const avgHeat=avgNum('heat');
  const avgCry=avgNum('cry');
  const diagnosis=()=>{
    if(!total && !abandonedTotal)return {title:'האבחון של גוגז',text:'המדף עוד מתארגן. אחרי הספר הראשון נתחיל לראות דפוסים ולהוציא מסקנות מוגזמות אך מבוססות.'};
    if(!total && abandonedTotal)return {title:'האבחון של גוגז',text:'כרגע המדף יותר בקטע של נטישות. גם זה דפוס, ואנחנו מכבדות אמת.'};
    if(socialBook&&friendCount(socialBook)>=3)return {title:'האבחון של גוגז',text:`${socialBook.title} הפך להיות מרכז חברתי קטן. ספר עם קשרים, דרמה וכנראה היסטוריה.`};
    if(avgObs>=4)return {title:'האבחון של גוגז',text:'יש פה רמת אובססיה יפה. את לא קוראת ספרים, את מפתחת קשרים רגשיים עם כריכה.'};
    if(redFlags>=3)return {title:'האבחון של גוגז',text:'יש חשד כבד שאת מזהה דגלים אדומים ועדיין ממשיכה לקרוא. לא שופטת, רק מתעדת.'};
    if(authorRepeat)return {title:'האבחון של גוגז',text:`${authorRepeat[0]} חזרה אצלך יותר מפעם אחת. זה כבר לא “סתם יצא”, זו מערכת יחסים.`};
    if(abandonmentRate>=35)return {title:'האבחון של גוגז',text:'ועדת הקבלה למדף שלך קשוחה. לא כל ספר מקבל ויזה עד הסוף.'};
    if(avgCry>=4)return {title:'האבחון של גוגז',text:'המדף שלך רגיש מאוד. יש פה פחות ספרים ויותר אירועי לב.'};
    if(swallowed>=Math.max(1,Math.ceil(total*0.4)))return {title:'האבחון של גוגז',text:'כשספר תופס אותך — את לא קוראת, את נעלמת אליו וחוזרת עם אחוזים חדשים.'};
    return {title:'האבחון של גוגז',text:'יש פה מדף עם טעם, מצב רוח וקצת דרמה בריאה. ממש חומר גלם טוב לפרסים.'};
  };
  const diag=diagnosis();
  const shimiAwards=[];
  if(redFlags>=3) shimiAwards.push(['🚩','מחפשת רד פלאגס','או לפחות מוצאת אותם מהר מאוד. השאלה מה את עושה עם המידע הזה היא כבר מחקר המשך.']);
  if(avgObs>=4) shimiAwards.push(['🧠','לא התאוששה רשמית','ממוצע האובססיה אומר שהספרים לא בדיוק נשארים רק במדף.']);
  if(swallowed>=2) shimiAwards.push(['⚡','אוכלת ספרים לארוחת בוקר','כמה ספרים אצלך עברו במצב “רק עוד פרק אחד” והפכו ל־“אופס סיימתי”.']);
  if(avgHeat>=4) shimiAwards.push(['🌡️','מדף עם מזגן חובה','ממוצע הלוהט גבוה מספיק כדי להצדיק אזהרת אש קטנה.']);
  if(avgCry>=4) shimiAwards.push(['💔','מלכת הדרמות','הלב שילם, אבל לפחות יש סטטיסטיקה יפה.']);
  if(readMoreYes>=2) shimiAwards.push(['✍️','מתאהבת בסופרות','כשסופרת עובדת טוב — את לא נפרדת, את פותחת לה תיקייה בראש.']);
  if(socialBook) shimiAwards.push(['🤝','מנהלת רשת קשרים רגשית',`ל־${socialBook.title} כבר יש ${friendCount(socialBook)} חברים במדף. זה לא ספר, זו שכונה.`]);
  if(!shimiAwards.length) shimiAwards.push(['🏅','המדף עוד שומר על מסתורין','עוד כמה ספרים, רגעים ודגלים — ואז האפליקציה תתחיל לרכל עלייך כמו שצריך.']);
  const awardCard=(label,book,score,icon,emptyText='יתמלא כשיהיו עוד נתונים')=>{
    const empty=!book;
    return `<div class="awardCardV64 ${empty?'awardEmptyV64':''}"><div class="awardTopV64"><div><div class="awardLabelV64">${esc(label)}</div><div class="awardScoreV64">${score||'—'}</div></div><div class="awardBadgeV64">${uiIcon(icon)}</div></div><div><div class="awardTitleV64">${book?esc(book.title||'בלי שם'):'עוד אין'}</div><div class="awardMetaV64">${book?esc(book.author||'בלי מחבר/ת'):emptyText}</div></div></div>`;
  };
  const characterAward=(label,ch,score)=>`<div class="awardCardV64 ${ch?'':'awardEmptyV64'}"><div class="awardTopV64"><div><div class="awardLabelV64">${esc(label)}</div><div class="awardScoreV64">${esc(score||'—')}</div></div><div class="awardBadgeV64">${uiIcon('users')}</div></div><div><div class="awardTitleV64">${ch?esc(ch.name||'דמות בלי שם'):'עוד אין'}</div><div class="awardMetaV64">${ch?esc([ch.bookTitle,ch.redFlag||ch.greenFlag||ch.stance||ch.tag].filter(Boolean).join(' · ')):'יופיע כשיהיו עוד דמויות ודגלים'}</div></div></div>`;
  const tiny=(value,label)=>`<div class="statsTinyV64"><div class="statsTinyValueV64">${esc(String(value))}</div><div class="statsTinyLabelV64">${esc(label)}</div></div>`;
  el.innerHTML=topHtml()+`
    <div class="statsPageNew statsPageV64">
      <section class="statsHeroNew statsHeroV64">
        <div class="eyebrow">Reading stats</div>
        <h2>סטטיסטיקה ופרסים</h2>
        <p>לא רק מספרים — המצעד, ההרגלים, הפרסים הקטנים והאבחון המאוד מדעי של גוגז.</p>
        <div class="statsHeroNote statsDiagnosisV64">${uiIcon('spark')} <b>${esc(diag.title)}</b>${esc(diag.text)}</div>
      </section>

      ${(total||abandonedTotal)?`
      <section class="statsGridNew statsMainGridV54">
        ${statCardNew(total,'סיימתי','ספרים שנכנסו למדף הקבוע','book')}
        ${statCardNew(finishedThisMonth,'החודש','ספרים שסיימת ב־'+monthLabel,'spark')}
        ${statCardNew(abandonedTotal,'נטשתי','ספרים שנפלו בדרך','chat')}
        ${statCardNew(abandonmentRate+'%','אחוז נטישה','מתוך כל הספרים שנרשמו','percent')}
      </section>

      ${total?`
      <section class="statsSectionNew">
        <div class="statsSectionHeadNew"><div><h3>המצעד של שימי</h3><p>הספרים שלקחו קטגוריה. כן, זה טקס.</p></div></div>
        <div class="statsAwardsGridV64">
          ${awardCard('הספר הכי אהוב',stars,stars?`אהבתי ${stars.stars}/5`:'—','heart')}
          ${awardCard('הספר הכי שבר אותי',cry,cry?`שבר ${cry.cry}/5`:'—','chat')}
          ${awardCard('הספר הכי לוהט',heat,heat?`לוהט ${heat.heat}/5`:'—','percent')}
          ${awardCard('הספר שנבלע הכי מהר',fast,fast?(SPEED[fast.speed-1]||'קצב גבוה'):'—','book')}
          ${awardCard('הכי נכנס לי לראש',obsession,obsession?`${obsession.obsession}/5 · ${obsessionLabel(obsession.obsession)}`:'—','spark')}
          ${awardCard('הספר הכי חברתי',socialBook,socialBook?`${friendCount(socialBook)} קשרים במדף`:'—','users')}
          ${characterAward('הדמות הכי חשודה',suspiciousChar,suspiciousChar?(suspiciousChar.redFlag||suspiciousChar.stance||'דגל אדום'):'—')}
          ${awardCard('הכי הרבה רגעים מהשטח',mostLoggedCount?mostLoggedBook:null,mostLoggedCount?`${mostLoggedCount} רגעים`:'—','note')}
        </div>
      </section>

      <section class="statsSectionNew">
        <div class="statsSectionHeadNew"><div><h3>ההרגלים שלי</h3><p>תובנות קטנות על מה שחוזר אצלך שוב ושוב.</p></div></div>
        <div class="statsListNew">
          ${statRowNew('סופרת/מחבר שחוזרים',topAuthor?topAuthor[0]:'עוד אין',topAuthor?`מופיע/ה ${topAuthor[1]} פעמים`:'כשיהיו יותר ספרים זה יתבהר','book')}
          ${statRowNew('וייב שכיח',topMood?topMood[0]:'עוד אין',topMood?`הופיע ${topMood[1]} פעמים`:'עדכוני וייב יופיעו כאן','chat')}
          ${statRowNew('סיבת קשר שחוזרת',topFriendReason?topFriendReason[0]:'עוד אין',topFriendReason?`הופיעה ${topFriendReason[1]} פעמים בין חברים של ספרים`:'יתמלא כשתקשרי עוד ספרים','users')}
          ${statRowNew('חותמת שחוזרת',topStamp?topStamp[0]:'עוד אין',topStamp?`הופיעה ${topStamp[1]} פעמים`:'יתמלא כשיהיו עוד סיכומים','spark')}
        </div>
      </section>

      <section class="statsSectionNew">
        <div class="statsSectionHeadNew"><div><h3>שימי Awards</h3><p>האפליקציה מחלקת לך תארים לפי ההתנהגות הספרותית שלך. בלי בושה.</p></div></div>
        <div class="shimiAwardsGridV64">${shimiAwards.slice(0,5).map(a=>`<div class="shimiAwardV64"><div class="shimiAwardEmojiV64">${a[0]}</div><div><div class="shimiAwardTitleV64">${esc(a[1])}</div><div class="shimiAwardTextV64">${esc(a[2])}</div></div></div>`).join('')}</div>
      </section>

      <section class="statsSectionNew">
        <div class="statsSectionHeadNew"><div><h3>מדדי דרמה</h3><p>ממוצעים והרגלים, אבל עם פחות תחושת דו״ח.</p></div></div>
        <div class="statsGridNew">
          ${statCardNew(avg('stars'),'ממוצע אהבתי','כמה קשה להרשים אותך','spark')}
          ${statCardNew(avg('obsession'),'ממוצע אובססיה','כמה הספרים נשארים בראש','heart')}
          ${statCardNew(avg('heat'),'ממוצע לוהט','כמה אש יש במדף','percent')}
          ${statCardNew(avg('cry'),'ממוצע שבר','כמה הלב שילם בדרך','chat')}
          ${statCardNew(allLogs.length,'רגעים מהשטח','כל העדכונים ששמרת בדרך','book')}
          ${statCardNew(warnings,'אזהרות קריאה','ספרים שקיבלו תמרור קטן','note')}
          ${statCardNew(redFlags,'דגלים אדומים','דמויות שזוהו כעניין בעייתי','users')}
          ${statCardNew(greenFlags,'דגלים ירוקים','דמויות שיצאו יחסית תקינות','spark')}
        </div>
      </section>

      <section class="statsSectionNew">
        <div class="statsSectionHeadNew"><div><h3>השנה שלי בקריאה</h3><p>תמונת מצב קטנה של ${currentYear}.</p></div></div>
        <div class="statsTinyGridV64">
          ${tiny(booksThisYear.length,'ספרים שסיימתי השנה')}
          ${tiny(abandonedThisYear.length,'ספרים שנטשתי השנה')}
          ${tiny(firstBookYear?firstBookYear.title:'—','הספר הראשון השנה')}
          ${tiny(lastBook?lastBook.title:'—','הספר האחרון שנכנס למדף')}
          ${tiny(allChars.length,'דמויות שתיעדת')}
          ${tiny(allFriends.length,'חברויות בין ספרים')}
          ${tiny(pitches,'ספרים עם תשובה לחברה')}
          ${tiny(noTalk,'רגעי לא לדבר איתי')}
        </div>
      </section>
      `:''}
      `:`<div class="statsEmptyNew">עוד אין מספיק נתונים לסטטיסטיקה. ברגע שתסיימי ספר ראשון, המסך הזה יתחיל לספר לך על המדף שלך.</div>`}

      ${abandonedTotal?`
      <section class="statsSectionNew statsAbandonV47 statsAbandonV54">
        <div class="statsSectionHeadNew"><div><h3>ספרים שנטשתי</h3><p>לא כל ספר חייב להגיע לסוף. גם איפה שעצרת אומר משהו.</p></div></div>
        <div class="statsAbandonGridV47">
          ${statCardNew(abandonedTotal,'נטישות בסך הכל','ספרים שלא שרדו עד הסוף','book')}
          ${statCardNew(abandonedThisMonth,'נטשתי החודש','ב־'+monthLabel,'chat')}
          ${statCardNew(avgAbandonedPercent+'%','ממוצע עצירה','בערך איפה הם ירדו מהמדף','percent')}
          ${statCardNew(abandonmentRate+'%','אחוז נטישה','מתוך כל הספרים שנרשמו','spark')}
        </div>
        ${abandonReasons.length?`<div class="statsAbandonReasonsV47">${abandonReasons.slice(0,3).map((r,i)=>`<div class="statsReasonPillV47"><b>${i===0?'סיבה אחרונה':'עוד סיבה'}</b>${esc(r)}</div>`).join('')}</div>`:`<div class="statsReasonPillV47"><b>אין סיבות רשומות עדיין</b>בפעם הבאה שתנטשי ספר ותכתבי למה, זה יופיע כאן.</div>`}
      </section>`:''}

      ${renderCustomTagsPanel()}

      <section class="backupPanelNew">
        <h3>גיבוי ושחזור</h3>
        <p>שומר קובץ JSON עם כל הספרים, הספר הפעיל, רגעים מהשטח, דמויות, תגיות אישיות, דירוגים, כריכות וסטטיסטיקות. שחזור מחליף את הנתונים הקיימים.</p>
        <div class="backupActionsNew">
          <button class="backupPrimaryNew" onclick="exportBackup()">${uiIcon('backup')} גיבוי הנתונים</button>
          <button class="backupSecondaryNew" onclick="chooseRestoreFile()">${uiIcon('restore')} שחזור מגיבוי</button>
        </div>
      </section>
    </div>
  `;
}
function statCardNew(value,label,sub,icon){
  return `<div class="statCardNew"><div class="statCardTop"><div><div class="statCardValue">${value}</div></div><div class="statCardIcon">${uiIcon(icon)}</div></div><div class="statCardLabel">${label}</div><div class="statCardSub">${sub}</div></div>`;
}
function statRowNew(label,value,sub,icon){
  return `<div class="statRowNew"><div class="statRowText"><div class="statRowLabel">${esc(label)}</div><div class="statRowValue">${esc(value)}</div><div class="statRowSub">${sub}</div></div><div class="statRowIcon">${uiIcon(icon)}</div></div>`;
}
function statsAwardCardV54(label,book,score,icon){
  return `<div class="statsAwardCardV54 statsAwardCardV56"><div class="statsAwardHeadV56"><div class="statsAwardTextV56"><div class="statsAwardLabelV54">${esc(label)}</div><div class="statsAwardScoreV54">${score}</div></div><div class="statsAwardIconV54">${uiIcon(icon)}</div></div><div class="statsAwardTitleV54">${book?esc(book.title||'בלי שם'):'עוד אין'}</div><div class="statsAwardAuthorV54">${book&&book.author?esc(book.author):'יתמלא כשיהיו עוד נתונים'}</div></div>`;
}

function exportBackup(){
  const payload={
    app:'עוד פרק אחד',
    version:64,
    exportedAt:new Date().toISOString(),
    data:S
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  const stamp=new Date().toISOString().slice(0,10);
  a.href=URL.createObjectURL(blob);
  a.download=`od-perek-ehad-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  toast('המדף נשמר 📚');
}
function chooseRestoreFile(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='application/json,.json';
  input.onchange=()=>{
    const file=input.files&&input.files[0];
    if(file) restoreFromFile(file);
  };
  input.click();
}
function restoreFromFile(file){
  if(!confirm('השחזור יחליף את הנתונים הקיימים באפליקציה. להמשיך?')) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const parsed=JSON.parse(String(reader.result||''));
      const data=parsed && parsed.data ? parsed.data : parsed;
      if(!data || !Array.isArray(data.books)) throw new Error('bad backup');
      S=normalize(data);
      localStorage.setItem(KEY,JSON.stringify(S));
      render();
      show('home');
      toast('המדף חזר למקום 📚');
    }catch(e){
      toast('הקובץ לא תקין, לא הצלחתי לשחזר');
    }
  };
  reader.onerror=()=>toast('לא הצלחתי לקרוא את הקובץ');
  reader.readAsText(file);
}

render();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
